<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Secure Pro LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        // Tailwind configuration for custom brand colors
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#004a80',
                        brandOrange: '#f7941d',
                        offWhite: '#fdfbf7',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass { backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Gradient Button - Blue to Orange mix based on logo */
        .btn-brand { 
            background: linear-gradient(135deg, #004a80 0%, #006eb9 50%, #f7941d 100%);
            transition: 0.4s;
            background-size: 200% auto;
        }
        .btn-brand:hover { background-position: right center; transform: translateY(-2px); }

        /* Themed Spinner */
        .spinner { 
            width: 50px; height: 50px; 
            border: 5px solid rgba(0, 74, 128, 0.2); 
            border-top: 5px solid #f7941d; 
            border-bottom: 5px solid #004a80;
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .logo-text-open { color: #fdfbf7; }
        .logo-text-class { color: #f7941d; }
        
        /* Dark/Light mode overrides */
        .dark body { background: #050505; color: #fff; }
        .light body { background: #fdfbf7; color: #002e50; }
        .light .glass { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0, 74, 128, 0.1); }
        .light .input-field { background: #fff; border: 1px solid #d1d5db; color: #002e50; }
    </style>
</head>
<body class="selection:bg-brandOrange/30">

    <!-- Toast Notifications -->
    <div id="toast-box" class="fixed top-4 right-4 left-4 md:left-auto z-[500] flex flex-col gap-3"></div>

    <!-- Global Loader -->
    <div id="global-loader" class="hidden fixed inset-0 z-[400] bg-black/80 flex flex-col items-center justify-center transition-all duration-500">
        <div class="spinner"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-brandOrange">Syncing Campus Hub...</p>
    </div>

    <!-- Media Vault -->
    <div id="media-vault" class="hidden fixed inset-0 z-[350] bg-black flex flex-col">
        <nav class="p-4 glass border-b border-white/5 flex justify-between items-center px-6 md:px-10">
            <div class="flex items-center gap-3">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-8 rounded" alt="Logo">
                <h3 id="vault-title" class="font-black text-xs md:text-sm italic uppercase truncate max-w-[200px]"><span class="logo-text-open">Open</span><span class="logo-text-class">Class</span></h3>
            </div>
            <button onclick="closeVault()" class="bg-brandBlue text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-colors">Close</button>
        </nav>
        <div class="flex-grow flex items-center justify-center p-2 md:p-4 bg-zinc-900">
            <iframe id="vault-frame" class="w-full aspect-video md:h-full max-w-6xl rounded-xl shadow-2xl bg-black" allowfullscreen></iframe>
        </div>
    </div>

    <!-- App Container -->
    <div id="app">
        <!-- Auth View -->
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-brandBlue/20 via-transparent to-transparent">
            <div class="w-full max-w-md glass p-8 md:p-10 rounded-[2.5rem] shadow-2xl text-center">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-xl shadow-lg" alt="OpenClass Logo">
                <h1 class="text-4xl md:text-5xl font-black mb-8 tracking-tighter italic">
                    <span class="logo-text-open">Open</span><span class="logo-text-class">Class</span>
                </h1>
                
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field w-full p-4 rounded-xl border-none outline-none dark:bg-zinc-900 bg-zinc-100">
                    <select id="reg-role" class="input-field w-full p-4 rounded-xl border-none outline-none dark:bg-zinc-900 bg-zinc-100">
                        <option value="STUDENT">Student</option>
                        <option value="TEACHER">Teacher</option>
                    </select>
                </div>
                
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Campus Email" class="input-field w-full p-4 rounded-xl border-none outline-none dark:bg-zinc-900 bg-zinc-100">
                    <div class="relative">
                        <input type="password" id="auth-pass" placeholder="Password" class="input-field w-full p-4 rounded-xl border-none outline-none dark:bg-zinc-900 bg-zinc-100">
                        <button onclick="togglePassword('auth-pass')" class="absolute right-4 top-4 text-zinc-500 text-xs font-bold uppercase tracking-widest">View</button>
                    </div>
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-brand text-white rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-brandBlue/30">Sign In</button>
                    <button onclick="toggleMode()" class="w-full text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-4 hover:text-brandOrange transition-colors">Create Campus Account</button>
                </div>
                
                <div class="mt-6 flex justify-center gap-4">
                    <button onclick="toggleDarkMode()" class="text-[9px] font-bold uppercase tracking-tighter p-2 rounded-lg border border-white/10">Toggle Mode 🌓</button>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-4 md:p-5 glass border-b border-white/5 sticky top-0 z-50 flex flex-col md:flex-row gap-4 md:gap-0 justify-between px-6 md:px-10 items-center">
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-10 rounded cursor-pointer" onclick="loadHome()" alt="Logo">
                    <h2 class="text-xl md:text-2xl font-black tracking-tighter cursor-pointer italic" onclick="loadHome()">
                        <span class="logo-text-open dark:text-offWhite text-brandBlue">Open</span><span class="logo-text-class">Class</span>
                    </h2>
                </div>
                
                <div class="relative w-full md:w-auto">
                    <input type="text" id="g-search" onkeyup="handleSearch(event)" placeholder="Search Teacher or ID..." class="bg-zinc-900/50 dark:text-white text-zinc-800 border border-brandBlue/20 rounded-2xl px-6 py-2 text-sm w-full md:w-80 outline-none focus:border-brandOrange transition-all md:focus:w-96">
                    <div id="search-results" class="hidden absolute top-full left-0 right-0 mt-4 glass p-4 rounded-[1.5rem] md:rounded-[2rem] border border-brandOrange/20 max-h-[60vh] overflow-y-auto shadow-2xl"></div>
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="text-xs">🌓</button>
                    <button onclick="logout()" class="text-[10px] font-black text-red-500 uppercase tracking-widest">Logout</button>
                </div>
            </nav>
            <main id="main-content" class="p-4 md:p-10 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[450] bg-black/95 flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass p-8 rounded-[3rem] text-center border border-brandOrange/20">
            <h3 class="text-2xl font-black mb-2 logo-text-class italic">Verify Security Code</h3>
            <p id="otp-note" class="text-zinc-500 text-[9px] mb-8 uppercase font-bold"></p>
            <input type="number" id="otp-input" class="input-field text-center text-4xl font-black mb-8 dark:bg-zinc-900 bg-white" placeholder="000000">
            <div class="flex gap-2">
                <button onclick="closeOtp()" class="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold uppercase text-xs">Cancel</button>
                <button onclick="verifyOtp()" class="flex-2 px-8 py-4 btn-brand rounded-2xl font-bold uppercase text-xs text-white">Verify</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbxII3g79Ri9EOX4zLr3rDgOlTprDwHsr5SEMysBqhh7owEKq9JcI4cVzvozIVdBJT6D8g/exec",
            EMAIL_SVC: "service_djr1n0f",
            EMAIL_TMP: "template_tiqnb53",
            EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false, genOtp, pending;

        // --- Core Utility Functions ---

        function togglePassword(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('oc_theme', isDark ? 'dark' : 'light');
        }

        // Initialize theme
        if (localStorage.getItem('oc_theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }

        function toast(msg, type="success") {
            const b = document.getElementById('toast-box');
            const d = document.createElement('div');
            d.className = `glass px-6 py-4 rounded-xl border-l-4 ${type==='success'?'border-brandOrange':'border-red-500'} text-[10px] font-black uppercase tracking-widest shadow-2xl animate-bounce`;
            d.innerText = msg; b.appendChild(d);
            setTimeout(() => d.remove(), 4000);
        }

        function toggleLoader(s) { document.getElementById('global-loader').classList[s?'remove':'add']('hidden'); }
        function closeOtp() { document.getElementById('otp-modal').classList.add('hidden'); genOtp = null; }
        function closeVault() { document.getElementById('media-vault').classList.add('hidden'); document.getElementById('vault-frame').src=""; }

        window.addEventListener('keydown', e => {
            if(e.key === 'Escape') { closeVault(); closeOtp(); }
        });

        if(user) renderDashboard();

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Verify Email" : "Sign In";
        }

        // --- Auth Logic ---

        async function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return toast("Fill all fields", "error");
            
            if(isSignup) {
                toggleLoader(true);
                genOtp = Math.floor(100000 + Math.random() * 900000);
                pending = { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value };
                document.getElementById('otp-note').innerText = `Security code sent to ${email}`;
                try {
                    await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: genOtp });
                    document.getElementById('otp-modal').classList.remove('hidden');
                } catch(e) { toast("Email Service Error", "error"); }
                toggleLoader(false);
            } else {
                toggleLoader(true);
                const res = await api("login", { email, password: pass });
                if(res.email) { 
                    localStorage.setItem('oc_user', JSON.stringify(res)); 
                    user = res; renderDashboard(); 
                    toast(`Welcome back, ${user.name}`);
                } else toast(res, "error");
                toggleLoader(false);
            }
        }

        async function verifyOtp() {
            if(document.getElementById('otp-input').value == genOtp) {
                toggleLoader(true);
                await api("signup", pending);
                toast("Campus Registration Success!");
                location.reload();
            } else toast("Security Code Mismatch", "error");
        }

        // --- Dashboard Logic ---

        function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            loadHome();
        }

        async function loadHome() {
            const main = document.getElementById('main-content');
            toggleLoader(true);
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-10">
                        <div class="glass p-6 md:p-8 rounded-[2rem] h-fit lg:sticky lg:top-28 border-brandBlue/10">
                            <h3 class="text-brandOrange font-black text-[10px] uppercase mb-6 tracking-widest italic">Publish Resource</h3>
                            <input id="up-title" placeholder="Topic Title" class="input-field mb-3 w-full p-3 rounded-xl dark:bg-zinc-900 bg-white border-none outline-none">
                            <input id="up-url" placeholder="Resource URL (YouTube/Drive)" class="input-field mb-3 w-full p-3 rounded-xl dark:bg-zinc-900 bg-white border-none outline-none">
                            <select id="up-type" class="input-field mb-6 w-full p-3 rounded-xl dark:bg-zinc-900 bg-white border-none outline-none">
                                <option value="VIDEO">Video Lesson</option>
                                <option value="FILE">Static File</option>
                            </select>
                            <button onclick="publish()" class="w-full py-4 btn-brand text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Go Live</button>
                            <div class="mt-8 pt-6 border-t border-brandBlue/10"><p class="text-[9px] text-zinc-500 uppercase font-black text-center tracking-widest">ID: ${user.teacherId}</p></div>
                        </div>
                        <div id="feed" class="lg:col-span-2 space-y-4 md:space-y-6"></div>
                    </div>`;
                const data = await api("search", { email: user.email }, user.teacherId);
                renderFeed(data[0]?.posts || [], true);
            } else {
                main.innerHTML = `<div id="feed" class="max-w-2xl mx-auto space-y-4 md:space-y-6"></div>`;
                const data = await api("get_subscribed_feed", { email: user.email });
                renderFeed(data, false);
            }
            toggleLoader(false);
        }

        async function handleSearch(e) {
            const q = e.target.value;
            const resDiv = document.getElementById('search-results');
            if(q.length < 2) return resDiv.classList.add('hidden');
            resDiv.classList.remove('hidden');
            resDiv.innerHTML = `<p class="p-4 text-center text-[10px] font-black text-brandOrange animate-pulse uppercase">Searching Network...</p>`;
            const data = await api("search", { email: user.email }, q);
            resDiv.innerHTML = data.map(t => `
                <div class="p-4 hover:bg-brandBlue/10 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 cursor-pointer group" onclick="viewTeacherProfile('${t.id}')">
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <p class="font-bold text-sm">${t.name}</p>
                            <span class="text-[8px] bg-brandOrange/10 text-brandOrange px-2 py-0.5 rounded-full font-black">${t.id}</span>
                        </div>
                        <p class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">${t.postCount} Posts • ${t.subCount} Subs</p>
                    </div>
                    <button onclick="event.stopPropagation(); toggleSubscription(this, '${t.id}', ${t.isSubscribed})" class="w-full sm:w-auto px-4 py-2 ${t.isSubscribed?'bg-zinc-800 text-zinc-600':'btn-brand text-white'} rounded-xl text-[9px] font-black uppercase transition-all">
                        ${t.isSubscribed?'Unsubscribe':'Subscribe'}
                    </button>
                </div>`).join('');
        }

        async function toggleSubscription(btn, tId, isSubbed) {
            btn.disabled = true;
            const action = isSubbed ? "unsubscribe" : "subscribe";
            await api(action, { studentEmail: user.email, teacherId: tId });
            toast(`${isSubbed?'Unfollowed':'Following'} Teacher!`);
            handleSearch({ target: { value: document.getElementById('g-search').value } });
            if(user.role === 'STUDENT') loadHome();
        }

        async function viewTeacherProfile(tId) {
            toggleLoader(true);
            const data = await api("search", { email: user.email }, tId);
            const t = data[0];
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <button onclick="loadHome()" class="mb-8 text-brandBlue dark:text-offWhite text-[10px] font-black uppercase tracking-widest hover:text-brandOrange transition-colors">← Back to Campus Feed</button>
                    <div class="glass p-6 md:p-10 rounded-[3rem] border border-brandOrange/10 mb-6 md:mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="text-center md:text-left">
                            <span class="text-[9px] text-brandOrange font-black uppercase tracking-widest">Verified Expert</span>
                            <h2 class="text-3xl md:text-4xl font-black italic tracking-tighter mt-1 logo-text-class">${t.name}</h2>
                            <p class="text-brandBlue dark:text-zinc-400 font-bold text-sm uppercase tracking-widest">${t.institute}</p>
                        </div>
                        <div class="flex items-center gap-6 md:gap-10">
                            <div class="flex gap-6 md:gap-10">
                                <div class="text-center"><p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Resources</p><p class="text-2xl md:text-3xl font-black">${t.postCount}</p></div>
                                <div class="text-center"><p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Following</p><p class="text-2xl md:text-3xl font-black">${t.subCount}</p></div>
                            </div>
                            <button onclick="toggleSubscription(this, '${t.id}', ${t.isSubscribed})" class="px-6 md:px-8 py-3 ${t.isSubscribed?'bg-zinc-800 text-zinc-600':'btn-brand text-white'} rounded-2xl text-[10px] font-black uppercase transition-all shadow-xl">
                                ${t.isSubscribed?'Unsubscribe':'Subscribe'}
                            </button>
                        </div>
                    </div>
                    <div class="space-y-4">${t.posts.map(p => `
                        <div class="glass p-5 md:p-6 rounded-[1.5rem] flex justify-between items-center group border border-transparent hover:border-brandOrange/20 transition-all">
                            <div class="flex items-center gap-3 md:gap-4 truncate">
                                <div class="flex-shrink-0 w-10 h-10 bg-brandBlue/10 rounded-2xl flex items-center justify-center text-brandBlue">${p.type==='VIDEO'?'🎬':'📄'}</div>
                                <div class="truncate">
                                    <h4 class="font-bold text-sm truncate">${p.title}</h4>
                                    <p class="text-[8px] text-brandOrange font-bold uppercase tracking-widest">by ${t.name}</p>
                                </div>
                            </div>
                            <button onclick="openResource('${p.id}','${p.url}','${p.type}','${p.title}')" class="bg-brandBlue text-white px-4 md:px-6 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:scale-105 transition-all">View</button>
                        </div>`).join('')}</div>
                </div>`;
            document.getElementById('search-results').classList.add('hidden');
            toggleLoader(false);
        }

        async function publish() {
            const t = document.getElementById('up-title').value.trim();
            const u = document.getElementById('up-url').value.trim();
            if(!t || !u) return toast("Missing metadata", "error");
            toggleLoader(true); 
            await api("upload", { teacherId: user.teacherId, teacherName: user.name, title: t, url: u, type: document.getElementById('up-type').value }); 
            toast("Resource Live!"); loadHome();
        }

        function renderFeed(data, isT) {
            const f = document.getElementById('feed');
            if(!data || !data.length) { f.innerHTML = `<p class="text-center py-20 text-zinc-500 uppercase text-[9px] font-black tracking-widest animate-pulse">No activity in this sector</p>`; return; }
            f.innerHTML = data.map(i => `
                <div class="glass p-6 md:p-8 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center border border-transparent hover:border-brandBlue/30 transition-all group shadow-xl gap-6">
                    <div class="flex items-center gap-4 md:gap-6 w-full sm:w-auto">
                        <div class="flex-shrink-0 w-12 h-12 md:w-14 md:h-14 bg-brandBlue/10 rounded-3xl flex items-center justify-center transition-all group-hover:scale-110">${i.type==='VIDEO'?'🎬':'📄'}</div>
                        <div class="truncate">
                            <p class="text-[9px] text-brandOrange font-black uppercase tracking-widest">${i.type}</p>
                            <h4 class="font-black text-lg md:text-xl tracking-tight italic truncate">${i.title}</h4>
                            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest truncate">${i.tName ? 'By: ' + i.tName : 'Campus Secure'} • ${i.views||0} Views</p>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="openResource('${i.id}','${i.url}','${i.type}','${i.title}')" class="flex-grow sm:flex-grow-0 bg-brandBlue text-white px-6 md:px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:scale-105 shadow-lg">Access</button>
                    </div>
                </div>`).join('');
        }

        function openResource(id, url, type, title) {
            document.getElementById('vault-title').innerText = title.toUpperCase();
            let src = url;
            if(type === 'VIDEO') {
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                src = `https://www.youtube.com/embed/${vid}?autoplay=1&modestbranding=1&rel=0`;
            } else if(url.includes('drive.google.com')) src = url.replace('/view', '/preview');
            document.getElementById('vault-frame').src = src;
            document.getElementById('media-vault').classList.remove('hidden');
        }

        async function api(a, p={}, q="") {
            try {
                const r = await fetch(`${CONFIG.URL}?action=${a}&query=${q}&payload=${encodeURIComponent(JSON.stringify(p))}`);
                return await r.json();
            } catch(e) { return "System Latency Error"; }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
