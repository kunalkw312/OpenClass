<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Premium SaaS LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brandBlue: '#004a80', brandOrange: '#f7941d' } } } }
    </script>
    <style>
        :root { --text-main: #fdfbf7; --bg-main: #050505; --glass-bg: rgba(15, 15, 15, 0.9); }
        .light { --text-main: #002e50; --bg-main: #fdfbf7; --glass-bg: rgba(255, 255, 255, 0.85); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: 0.4s; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid rgba(128,128,128,0.1); }
        .btn-brand { background: linear-gradient(135deg, #004a80 0%, #f7941d 100%); color: white; font-weight: 800; text-transform: uppercase; }
        .input-field { background: #111; border: 1px solid rgba(128,128,128,0.2); color: white; outline: none; padding: 1rem; border-radius: 14px; width: 100%; }
        .light .input-field { background: #fff; color: #002e50; }
    </style>
</head>
<body>
    <div id="toast-box" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[4000] flex flex-col gap-2 pointer-events-none"></div>

    <div id="media-vault" class="hidden fixed inset-0 z-[2000] bg-black flex items-center justify-center">
        <button id="close-vault-btn" class="absolute top-6 right-6 bg-white/10 text-white w-12 h-12 rounded-full font-black z-[2100]">✕</button>
        <iframe id="vault-frame" class="w-full h-full max-w-7xl max-h-[90vh] border-none rounded-xl bg-black" allowfullscreen></iframe>
    </div>

    <div id="app">
        <!-- Auth Screen -->
        <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] text-center shadow-2xl">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-2xl">
                <h1 class="text-4xl font-black mb-8 italic">Open<span class="text-brandOrange">Class</span></h1>
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="student">Student Account</option>
                        <option value="teacher">Teacher Account</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button id="primary-btn" class="w-full py-4 btn-brand rounded-2xl">Sign In</button>
                    <button id="google-btn" class="w-full py-4 glass dark:text-white light:text-brandBlue rounded-2xl font-bold uppercase text-[10px] flex items-center justify-center gap-4 border border-zinc-500/20">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Continue with Google
                    </button>
                    <button id="toggle-btn" class="w-full text-[10px] text-zinc-500 font-bold uppercase mt-6">Create New Profile</button>
                </div>
            </div>
        </div>

        <!-- Verification -->
        <div id="verify-screen" class="hidden min-h-screen flex items-center justify-center p-6 text-center">
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem]">
                <h2 class="text-3xl font-black mb-4 italic">Verify Identity</h2>
                <p id="verify-note" class="text-zinc-500 text-[10px] mb-8 uppercase font-bold tracking-widest"></p>
                <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-5xl font-black mb-6 py-6">
                <button id="verify-otp-btn" class="w-full py-5 btn-brand rounded-2xl shadow-xl">Verify Code</button>
            </div>
        </div>

        <!-- Onboarding -->
        <div id="onboarding-screen" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] border-brandOrange/20 shadow-2xl">
                <h2 class="text-3xl font-black mb-6 italic text-center">Setup Profile</h2>
                <div class="space-y-4">
                    <input type="text" id="ob-name" placeholder="Full Name" class="input-field">
                    <select id="ob-role" class="input-field">
                        <option value="student">Student Account</option>
                        <option value="teacher">Teacher Account</option>
                    </select>
                    <input type="password" id="ob-pass" placeholder="Create Security Password" class="input-field">
                    <button id="finalize-btn" class="w-full py-5 btn-brand rounded-2xl">Join Campus</button>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-5 glass border-b border-white/5 sticky top-0 z-[1000] flex justify-between items-center px-10">
                <h2 class="text-2xl font-black italic tracking-tighter cursor-pointer" id="nav-logo">Open<span class="text-brandOrange">Class</span></h2>
                <div class="flex items-center gap-6">
                    <div class="relative w-80 group">
                        <input type="text" id="g-search" placeholder="Search Teacher or Topic..." class="input-field rounded-2xl pl-12 py-2.5 text-sm">
                    </div>
                    <button id="theme-toggle" class="p-2 glass rounded-xl">🌓</button>
                    <div id="nav-profile-pic" class="w-10 h-10 rounded-full border-2 border-brandOrange/30 overflow-hidden hidden md:block"></div>
                    <button id="logout-btn" class="text-[10px] font-black text-red-500 uppercase px-4 py-2 border border-red-500/20 rounded-xl">Logout</button>
                </div>
            </nav>
            <main id="main-content" class="p-10 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <script type="module">
        import * as Core from "./app.js";

        let profile = null;
        let isSignup = false;
        let otpCode = null;
        let tempUser = null;

        // Navigation Engine
        window.navigate = (p, q = '') => {
            history.pushState({p, q}, '', `#${p}`);
            renderContent(p, q);
        };

        async function renderContent(p, q) {
            const main = document.getElementById('main-content');
            if (p === 'home') loadHome();
            else if (p === 'search') loadSearch(q || document.getElementById('g-search').value);
            else if (p === 'profile') viewTeacher(q);
        }

        // Auth Observer
        Core.onAuthStateChanged(Core.auth, async (user) => {
            if (user) {
                const docSnap = await Core.getDoc(Core.doc(Core.db, "users", user.uid));
                if (!docSnap.exists()) showScreen('onboarding-screen');
                else {
                    profile = docSnap.data();
                    if(profile.photo) document.getElementById('nav-profile-pic').innerHTML = `<img src="${profile.photo}" class="w-full h-full object-cover">`;
                    showScreen('dashboard');
                    const hash = window.location.hash.substring(1) || 'home';
                    renderContent(hash);
                }
            } else showScreen('auth-screen');
        });

        // Event Bindings
        document.getElementById('primary-btn').onclick = async () => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            if (isSignup) {
                tempUser = { e, p, n: document.getElementById('reg-name').value, r: document.getElementById('reg-role').value };
                otpCode = Math.floor(100000 + Math.random() * 900000);
                await Core.sendOTP(e, otpCode);
                document.getElementById('verify-note').innerText = `Sent to ${e}`;
                showScreen('verify-screen');
            } else {
                try { await Core.signInWithEmailAndPassword(Core.auth, e, p); } catch(err) { alert(err.message); }
            }
        };

        document.getElementById('google-btn').onclick = () => Core.signInWithPopup(Core.auth, Core.provider);
        document.getElementById('toggle-btn').onclick = () => {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('toggle-btn').innerText = isSignup ? "Already have an account? Login" : "Create New Profile";
        };
        document.getElementById('verify-otp-btn').onclick = async () => {
            if (document.getElementById('otp-input').value == otpCode) {
                const { e, p, n, r } = tempUser;
                const cred = await Core.createUserWithEmailAndPassword(Core.auth, e, p);
                const tId = "OC-" + n.split(' ')[0].toUpperCase() + Math.floor(100+Math.random()*899);
                await Core.setDoc(Core.doc(Core.db, "users", cred.user.uid), { 
                    name: n, role: r, teacherId: tId, email: e, subs: [], joined: new Date().toLocaleDateString(), photo: "" 
                });
            }
        };
        document.getElementById('logout-btn').onclick = () => Core.signOut(Core.auth).then(() => location.reload());
        document.getElementById('theme-toggle').onclick = () => document.documentElement.classList.toggle('light');
        document.getElementById('nav-logo').onclick = () => navigate('home');

        function showScreen(id) {
            ['auth-screen', 'verify-screen', 'onboarding-screen', 'dashboard'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function loadHome() {
            const main = document.getElementById('main-content');
            if (profile.role === 'teacher') {
                main.innerHTML = `<div class="grid lg:grid-cols-3 gap-10">
                    <div class="glass p-8 rounded-[3rem] h-fit">
                        <input id="up-t" placeholder="Title" class="input-field mb-3"><input id="up-u" placeholder="URL" class="input-field mb-6">
                        <button id="pub-btn" class="w-full py-4 btn-brand rounded-2xl">Publish</button>
                    </div>
                    <div id="feed" class="lg:col-span-2 space-y-4"></div>
                </div>`;
                document.getElementById('pub-btn').onclick = async () => {
                    await Core.addDoc(Core.collection(Core.db, "content"), { 
                        title: document.getElementById('up-t').value, url: document.getElementById('up-u').value, 
                        tId: profile.teacherId, tName: profile.name, date: Core.serverTimestamp(), views: 0 
                    });
                    loadHome();
                };
            }
        }
    </script>
</body>
</html>
