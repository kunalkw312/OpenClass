<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass Pro | Elite LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080808; color: #eee; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-orange { background: #f97316; transition: 0.3s; font-weight: 700; border-radius: 12px; }
        .btn-orange:hover { background: #ea580c; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(249, 115, 22, 0.4); }
        .input-field { background: #121212; border: 1px solid #222; padding: 12px; border-radius: 12px; width: 100%; outline: none; color: white; transition: 0.3s; }
        .input-field:focus { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.1); }
        .sidebar-item { transition: 0.2s; cursor: pointer; border-radius: 10px; padding: 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="app">
        <!-- Auth Screen (Keep your existing Auth UI here) -->
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[2.5rem] shadow-2xl">
                <h1 class="text-4xl font-black text-orange-500 text-center mb-8 tracking-tighter italic">OpenClass</h1>
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <input type="text" id="reg-inst" placeholder="Institute Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="STUDENT">I am a Student</option>
                        <option value="TEACHER">I am a Teacher</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email Address" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-orange">LOGIN</button>
                    <button onclick="toggleMode()" class="w-full text-[10px] text-zinc-500 font-bold tracking-widest mt-4 uppercase">Switch to Signup</button>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-4 border-b border-zinc-900 glass flex justify-between items-center sticky top-0 z-50">
                <h2 class="text-xl font-black text-orange-500 tracking-tighter">OPENCLASS</h2>
                <div class="flex gap-4">
                    <input type="text" id="teacher-search" placeholder="Search Teacher ID/Name..." class="bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-1 text-xs outline-none focus:border-orange-500">
                    <button onclick="searchTeachers()" class="text-xs font-bold text-orange-500">SEARCH</button>
                    <button onclick="logout()" class="text-xs text-zinc-600">LOGOUT</button>
                </div>
            </nav>

            <main id="main-content" class="p-6 max-w-6xl mx-auto w-full"></main>
        </div>
    </div>

    <!-- OTP Modal (Keep your existing OTP UI) -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[2.5rem] relative">
            <button onclick="closeOtp()" class="absolute top-6 right-6 text-zinc-500 hover:text-white">✕</button>
            <h3 class="text-xl font-bold mb-6 text-center">Verify Identity</h3>
            <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-3xl font-black mb-6">
            <button onclick="verifyOtp()" class="w-full py-4 btn-orange rounded-xl uppercase">Verify</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbzflbhfSr_P56Egg-BUjXpmkozFtb_Kkh5kkt_UqI5kx9BZCAaPh2BysQLVAOdId1mm5w/exec",
            EMAIL_SVC: "service_djr1n0f",
            EMAIL_TMP: "template_tiqnb53",
            EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };

        let user = JSON.parse(localStorage.getItem('oc_user'));
        if(user) renderDashboard();

        async function api(action, payload = {}, query = "", id = "") {
            const url = `${CONFIG.URL}?action=${action}&query=${query}&id=${id}&email=${user?.email}&teacherId=${user?.teacherId}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            const res = await fetch(url);
            return await res.json();
        }

        // --- DASHBOARD RENDERING ---
        async function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            
            const main = document.getElementById('main-content');
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid md:grid-cols-4 gap-8">
                        <div class="md:col-span-1 glass p-6 rounded-3xl h-fit">
                            <h3 class="text-orange-500 font-bold text-xs uppercase mb-4 tracking-widest">New Content</h3>
                            <input id="up-title" placeholder="Topic" class="input-field mb-3">
                            <input id="up-url" placeholder="URL Link" class="input-field mb-3">
                            <select id="up-type" class="input-field mb-4">
                                <option value="VIDEO">Video Lesson</option>
                                <option value="FILE">Document</option>
                                <option value="UPDATE">Update</option>
                            </select>
                            <button onclick="uploadContent()" class="w-full py-3 btn-orange text-xs uppercase">Publish</button>
                            <div class="mt-8 pt-8 border-t border-zinc-800">
                                <p class="text-[10px] text-zinc-500 uppercase">My Teacher ID</p>
                                <p class="text-xl font-black text-white">${user.teacherId}</p>
                            </div>
                        </div>
                        <div id="content-list" class="md:col-span-3 space-y-4">Loading your uploads...</div>
                    </div>
                `;
                loadTeacherContent();
            } else {
                main.innerHTML = `<div id="feed-list" class="space-y-4">Loading Subscribed Feed...</div>`;
                loadSubscribedFeed();
            }
        }

        // --- TEACHER ACTIONS ---
        async function loadTeacherContent() {
            const data = await api("get_teacher_content", {}, "", user.teacherId);
            const list = document.getElementById('content-list');
            list.innerHTML = data.map(item => `
                <div class="glass p-6 rounded-2xl flex justify-between items-center group">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] bg-orange-500/10 text-orange-500 px-2 py-0.5 rounded font-bold">${item.type}</span>
                            <span class="text-[10px] text-zinc-500 uppercase">${item.views} Views</span>
                        </div>
                        <h4 class="font-bold text-lg">${item.title}</h4>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="deleteContent('${item.id}')" class="text-zinc-600 hover:text-red-500 text-xs">DELETE</button>
                    </div>
                </div>
            `).join('');
        }

        async function uploadContent() {
            const payload = { teacherId: user.teacherId, teacherName: user.name, title: document.getElementById('up-title').value, url: document.getElementById('up-url').value, type: document.getElementById('up-type').value };
            await api("upload", payload);
            alert("Uploaded!");
            loadTeacherContent();
        }

        async function deleteContent(id) {
            if(!confirm("Delete this?")) return;
            await api("delete", {}, "", id);
            loadTeacherContent();
        }

        // --- STUDENT ACTIONS ---
        async function searchTeachers() {
            const q = document.getElementById('teacher-search').value;
            const data = await api("search_teachers", {}, q);
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <h3 class="text-xl font-bold mb-6">Search Results for "${q}"</h3>
                <div class="grid md:grid-cols-2 gap-4">
                    ${data.map(t => `
                        <div class="glass p-6 rounded-2xl flex justify-between items-center">
                            <div>
                                <p class="font-bold text-lg">${t.name}</p>
                                <p class="text-xs text-zinc-500">${t.institute} • ID: ${t.teacherId}</p>
                            </div>
                            <button onclick="subscribe('${t.teacherId}')" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-xs uppercase">Subscribe</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function subscribe(tId) {
            await api("subscribe", { studentEmail: user.email, teacherId: tId });
            alert("Subscribed! Content from this teacher will now appear in your feed.");
            renderDashboard();
        }

        async function loadSubscribedFeed() {
            const data = await api("get_subscribed_feed");
            const list = document.getElementById('feed-list');
            if(!data.length) {
                list.innerHTML = `<div class="text-center py-20 text-zinc-600">No content found. Search for teachers to subscribe!</div>`;
                return;
            }
            list.innerHTML = data.map(item => `
                <div class="glass p-6 rounded-2xl flex justify-between items-center">
                    <div>
                        <p class="text-[10px] text-orange-500 font-bold uppercase mb-1">${item.type} • By ${item.tName}</p>
                        <h4 class="font-bold text-lg">${item.title}</h4>
                    </div>
                    <button onclick="viewMedia('${item.id}', '${item.url}', '${item.type}')" class="px-6 py-2 btn-orange text-xs uppercase">View</button>
                </div>
            `).join('');
        }

        function viewMedia(id, url, type) {
            api("track_view", {}, "", id);
            window.open(url, '_blank');
        }

        // --- UTILS ---
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
