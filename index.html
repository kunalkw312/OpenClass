<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Secure Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid #333; }
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="no-select">

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
        <h1 class="text-6xl font-black text-orange-500 mb-12 tracking-tighter text-center">OpenClass</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
            <button onclick="startAuth('TEACHER')" class="p-10 border-2 border-orange-500/30 rounded-3xl hover:bg-orange-500 transition-all text-2xl font-bold uppercase">Teacher</button>
            <button onclick="startAuth('STUDENT')" class="p-10 border-2 border-blue-500/30 rounded-3xl hover:bg-blue-500 transition-all text-2xl font-bold uppercase">Student</button>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <nav class="p-4 border-b border-zinc-800 flex justify-between items-center glass sticky top-0 z-50">
            <h2 class="text-xl font-black text-orange-500">OPENCLASS</h2>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-xs text-zinc-500 bg-zinc-900 px-2 py-1 rounded"></span>
                <button onclick="logout()" class="text-xs text-zinc-500 hover:text-red-500 font-bold">LOGOUT</button>
            </div>
        </nav>
        <main id="main-content" class="p-6 max-w-4xl mx-auto w-full space-y-8"></main>
    </div>

    <!-- PLAYER MODAL -->
    <div id="video-modal" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4">
        <button onclick="closePlayer()" class="absolute top-6 right-6 text-white text-2xl">✕</button>
        <div class="relative w-full max-w-5xl aspect-video rounded-2xl overflow-hidden shadow-2xl border border-zinc-800">
            <div class="absolute inset-0 z-10 bg-transparent" oncontextmenu="return false;"></div> 
            <iframe id="player-frame" class="w-full h-full" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        const CONFIG = {
            SHEET_URL: "https://script.google.com/macros/s/AKfycby0xNAv1sNdo34kpPHkrlAceq8iZDOMXaoy9k_B9_hvTFtjR935CqCylGw1egqP8ppDdA/exec",
            EMAILJS_PUB: "P88qoYcr5CHYVNAPw",
            EMAILJS_SVC: "service_djr1n0f",
            EMAILJS_TMP: "template_6ktzov1"
        };

        emailjs.init(CONFIG.EMAILJS_PUB);

        let currentEmail = localStorage.getItem('oc_email');
        let currentRole = localStorage.getItem('oc_role');

        // Automatic login if data exists
        if(currentEmail && currentRole) {
            window.onload = () => showDashboard();
        }

        async function startAuth(role) {
            const email = prompt("Enter your email:");
            if(!email || !email.includes('@')) return;

            const otp = Math.floor(100000 + Math.random() * 900000);
            
            emailjs.send(CONFIG.EMAILJS_SVC, CONFIG.EMAILJS_TMP, {
                to_email: email, 
                otp: otp
            })
            .then(function() {
                const userOtp = prompt("Enter the code sent to " + email);
                if(userOtp == otp) {
                    localStorage.setItem('oc_email', email);
                    localStorage.setItem('oc_role', role);
                    currentEmail = email;
                    currentRole = role;
                    showDashboard();
                } else {
                    alert("Invalid OTP code.");
                }
            }, function(err) {
                alert("Failed to send OTP. Error: " + JSON.stringify(err));
            });
        }

        function showDashboard() {
            // 1. Switch Screen Visibility First
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentEmail;
            
            const main = document.getElementById('main-content');
            const teacherId = "OC-" + currentEmail.split('@')[0].toUpperCase();

            // 2. Load UI based on Role
            if(currentRole === 'TEACHER') {
                main.innerHTML = `
                    <div class="p-8 glass rounded-3xl border-orange-500/20">
                        <h3 class="text-orange-500 font-bold uppercase text-[10px] mb-1">Public ID</h3>
                        <p class="text-4xl font-black">${teacherId}</p>
                    </div>
                    <div class="glass p-6 rounded-3xl space-y-4">
                        <input id="title" placeholder="Lesson Title" class="w-full p-4 bg-black rounded-xl border border-zinc-800 outline-none focus:border-orange-500">
                        <input id="url" placeholder="Video Link (YouTube) or PDF URL" class="w-full p-4 bg-black rounded-xl border border-zinc-800 outline-none focus:border-orange-500">
                        <button onclick="saveLink()" class="w-full py-4 bg-orange-600 rounded-xl font-bold uppercase">Publish</button>
                    </div>
                    <div id="teacher-list" class="space-y-3"></div>
                `;
                fetchContent(teacherId, 'teacher-list');
            } else {
                main.innerHTML = `
                    <div class="flex gap-2">
                        <input id="search-id" placeholder="Enter Teacher ID (OC-NAME)" class="flex-grow p-4 bg-zinc-900 rounded-2xl border border-zinc-800 outline-none focus:border-blue-500">
                        <button onclick="searchTeacher()" class="bg-blue-600 px-8 rounded-2xl font-bold uppercase">Find</button>
                    </div>
                    <div id="student-list" class="grid gap-4 mt-8"></div>
                `;
            }
        }

        async function saveLink() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const teacherId = "OC-" + currentEmail.split('@')[0].toUpperCase();
            if(!title || !url) return alert("Fill all fields");

            await fetch(CONFIG.SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    type: "content",
                    action: "save",
                    row: [teacherId, title, url, url.toLowerCase().includes('.pdf') ? 'PDF' : 'VIDEO']
                })
            });
            alert("Published!");
            fetchContent(teacherId, 'teacher-list');
        }

        async function fetchContent(id, containerId) {
            try {
                const res = await fetch(CONFIG.SHEET_URL + "?teacherId=" + id);
                const data = await res.json();
                const list = document.getElementById(containerId);
                if(!list) return;

                if(data.length === 0) {
                    list.innerHTML = `<p class="text-zinc-600 italic">No lessons found.</p>`;
                    return;
                }

                list.innerHTML = data.map(item => `
                    <div class="glass p-4 rounded-xl flex justify-between items-center">
                        <div><p class="font-bold text-sm">${item[1]}</p><p class="text-[10px] text-zinc-500 uppercase">${item[3]}</p></div>
                        <button onclick="openContent('${item[2]}', '${item[3]}')" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Open</button>
                    </div>
                `).join('');
            } catch(e) { console.error("Data error:", e); }
        }

        function searchTeacher() {
            const id = document.getElementById('search-id').value.toUpperCase().trim();
            if(id) fetchContent(id, 'student-list');
        }

        function openContent(url, type) {
            if(type === 'VIDEO') {
                let embedUrl = url;
                if(url.includes("watch?v=")) embedUrl = url.replace("watch?v=", "embed/");
                if(url.includes("youtu.be/")) embedUrl = url.replace("youtu.be/", "youtube.com/embed/");
                document.getElementById('player-frame').src = embedUrl;
                document.getElementById('video-modal').classList.remove('hidden');
            } else {
                window.open(url, '_blank');
            }
        }

        function closePlayer() {
            document.getElementById('video-modal').classList.add('hidden');
            document.getElementById('player-frame').src = "";
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
