<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Educational Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .btn-orange { background: #f97316; transition: 0.3s; font-weight: 700; }
        .btn-orange:hover { background: #ea580c; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3); }
        .input-field { background: #111; border: 1px solid #222; padding: 12px; border-radius: 12px; width: 100%; outline: none; color: white; }
        .input-field:focus { border-color: #f97316; }
        .card { transition: 0.3s; border: 1px solid transparent; }
        .card:hover { border-color: #f97316; background: rgba(249, 115, 22, 0.05); }
    </style>
</head>
<body>

    <!-- Auth Section -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[2.5rem]">
            <h1 class="text-4xl font-black text-orange-500 text-center mb-8 tracking-tighter">OpenClass</h1>
            <div id="signup-fields" class="hidden space-y-4 mb-4">
                <input type="text" id="reg-name" placeholder="Your Name" class="input-field">
                <select id="reg-role" class="input-field">
                    <option value="STUDENT">I'm a Student</option>
                    <option value="TEACHER">I'm a Teacher</option>
                </select>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="input-field">
                <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-orange rounded-xl">Login</button>
                <button onclick="toggleMode()" class="w-full text-[10px] text-zinc-600 font-bold tracking-widest mt-4 uppercase">Switch to Signup</button>
            </div>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[2.5rem] relative">
            <button onclick="closeOtp()" class="absolute top-6 right-6 text-zinc-500 hover:text-white">✕</button>
            <div class="text-center">
                <h3 class="text-xl font-bold mb-2">Verify OTP</h3>
                <p id="otp-note" class="text-zinc-500 text-xs mb-6"></p>
                <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-3xl font-black mb-6">
                <button onclick="verifyOtp()" class="w-full py-4 btn-orange rounded-xl">Verify & Finish</button>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden min-h-screen flex flex-col">
        <nav class="p-4 border-b border-zinc-900 glass flex justify-between items-center sticky top-0 z-50">
            <h2 class="text-xl font-black text-orange-500 tracking-tighter cursor-pointer" onclick="loadHome()">OPENCLASS</h2>
            <div class="flex items-center gap-4">
                <input type="text" id="global-search" onkeyup="if(event.key==='Enter') searchAll()" placeholder="Search content or teacher..." class="hidden md:block bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-1 text-xs w-64 outline-none focus:border-orange-500">
                <button onclick="logout()" class="text-xs font-bold text-zinc-600 hover:text-red-500">LOGOUT</button>
            </div>
        </nav>

        <main id="main-content" class="p-6 max-w-5xl mx-auto w-full"></main>
    </div>

    <!-- Video Modal -->
    <div id="player-modal" class="hidden fixed inset-0 z-[100] bg-black flex items-center justify-center">
        <button onclick="closePlayer()" class="absolute top-8 right-8 text-white text-2xl">✕</button>
        <iframe id="main-player" class="w-full max-w-4xl aspect-video rounded-2xl" allowfullscreen allow="autoplay"></iframe>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbxfOvSwHXIV0ksrJfeEWBBFzvoZZej35ACeeTVh1YJF61io2X43H1P8Hn9tPdvds1in3w/exec",
            EMAIL_SVC: "service_djr1n0f",
            EMAIL_TMP: "template_tiqnb53",
            EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false, genOtp, pendingData;

        if(user) renderDashboard();

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Verify Email" : "Login";
        }

        function closeOtp() { document.getElementById('otp-modal').classList.add('hidden'); }

        async function api(action, payload = {}, query = "") {
            const url = `${CONFIG.URL}?action=${action}&query=${query}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
            const res = await fetch(url);
            return await res.json();
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if(isSignup) {
                genOtp = Math.floor(100000 + Math.random() * 900000);
                pendingData = { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value };
                document.getElementById('otp-note').innerText = `OTP has been sent to ${email}`;
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: genOtp });
                document.getElementById('otp-modal').classList.remove('hidden');
            } else {
                const res = await api("login", { email, password: pass });
                if(res.email) { localStorage.setItem('oc_user', JSON.stringify(res)); user = res; renderDashboard(); }
                else { alert(res); }
            }
        }

        async function verifyOtp() {
            if(document.getElementById('otp-input').value == genOtp) {
                const res = await api("signup", pendingData);
                if(res === "Success") { alert("Profile Created!"); location.reload(); }
                else { alert(res); }
            } else { alert("Wrong OTP"); }
        }

        function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            loadHome();
        }

        async function loadHome() {
            const main = document.getElementById('main-content');
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="md:col-span-1 space-y-4">
                            <div class="glass p-6 rounded-3xl sticky top-24">
                                <h3 class="text-orange-500 font-bold text-sm mb-4">NEW UPLOAD</h3>
                                <input id="up-title" placeholder="Topic Title" class="input-field mb-3">
                                <input id="up-url" placeholder="Link (YouTube/Drive)" class="input-field mb-3">
                                <select id="up-type" class="input-field mb-4">
                                    <option value="VIDEO">Video Lesson</option>
                                    <option value="FILE">Document/PDF</option>
                                    <option value="UPDATE">General Update</option>
                                </select>
                                <button onclick="uploadContent()" class="w-full py-3 btn-orange rounded-xl uppercase text-xs">Post to Feed</button>
                            </div>
                        </div>
                        <div id="feed" class="md:col-span-2 space-y-4">Loading Feed...</div>
                    </div>
                `;
            } else {
                main.innerHTML = `<div id="feed" class="space-y-4">Loading Global Feed...</div>`;
            }
            const data = await api("get_feed");
            renderFeed(data);
        }

        async function uploadContent() {
            const payload = {
                teacherId: user.teacherId,
                teacherName: user.name,
                title: document.getElementById('up-title').value,
                url: document.getElementById('up-url').value,
                type: document.getElementById('up-type').value
            };
            await api("upload", payload);
            alert("Published!");
            loadHome();
        }

        async function searchAll() {
            const q = document.getElementById('global-search').value;
            const data = await api("search", {}, q);
            renderFeed(data);
        }

        function renderFeed(data) {
            const feed = document.getElementById('feed');
            if(!data || data.length === 0) { feed.innerHTML = "No posts found."; return; }
            feed.innerHTML = data.map(item => `
                <div class="glass p-6 rounded-2xl card flex justify-between items-center">
                    <div>
                        <span class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">${item.type}</span>
                        <h4 class="text-lg font-bold mt-1">${item.title}</h4>
                        <p class="text-xs text-zinc-500">By ${item.tName} (${item.tId})</p>
                    </div>
                    <button onclick="openLink('${item.url}', '${item.type}')" class="px-6 py-2 bg-white text-black rounded-lg font-bold text-xs uppercase">View</button>
                </div>
            `).join('');
        }

        function openLink(url, type) {
            if(type === 'VIDEO') {
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                document.getElementById('player-modal').classList.remove('hidden');
            } else { window.open(url, '_blank'); }
        }

        function closePlayer() { document.getElementById('player-modal').classList.add('hidden'); document.getElementById('main-player').src=""; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
