<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Premium SaaS LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brandBlue: '#004a80', brandOrange: '#f7941d' } } } }
    </script>
    <style>
        :root { --text-main: #fdfbf7; --bg-main: #050505; --glass-bg: rgba(15, 15, 15, 0.9); --input-bg: #111; }
        .light { --text-main: #002e50; --bg-main: #fdfbf7; --glass-bg: rgba(255, 255, 255, 0.85); --input-bg: #fff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: 0.4s; overflow-x: hidden; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid rgba(128, 128, 128, 0.1); }
        .btn-brand { background: linear-gradient(135deg, #004a80 0%, #f7941d 100%); background-size: 200% auto; transition: 0.5s; color: white; font-weight: 800; text-transform: uppercase; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-brand:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 74, 128, 0.2); }
        .input-field { background: var(--input-bg); border: 1px solid rgba(128, 128, 128, 0.2); color: var(--text-main); outline: none; padding: 1rem; border-radius: 14px; width: 100%; }
        #toast-box { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast-pill { background: #111; color: #fff; padding: 0.6rem 1.5rem; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: 800; text-transform: uppercase; animation: popUp 0.3s forwards; }
        .skeleton { background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { background-position: -200% 0; } }
        @keyframes popUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-brandOrange/30">
    <div id="toast-box"></div>

    <div id="custom-modal" class="hidden fixed inset-0 z-[2500] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div id="modal-content" class="w-full max-w-md glass p-10 rounded-[3rem] border border-brandOrange/20 shadow-2xl"></div>
    </div>

    <div id="media-vault" class="hidden fixed inset-0 z-[2000] bg-black flex items-center justify-center">
        <button onclick="closeVault()" class="absolute top-6 right-6 bg-white/10 hover:bg-red-500 text-white w-12 h-12 rounded-full flex items-center justify-center font-black z-[2100]">✕</button>
        <iframe id="vault-frame" class="w-full h-full max-w-7xl max-h-[90vh] border-none rounded-xl bg-black" allowfullscreen></iframe>
    </div>

    <div id="group-chat-window" class="hidden fixed inset-0 bg-black/95 z-[6000] flex flex-col">
        <div class="p-5 glass flex justify-between items-center border-b border-white/5">
            <h2 id="group-chat-title" class="text-2xl font-black italic">Group</h2>
            <button onclick="closeGroupChat()" class="text-2xl">✕</button>
        </div>
        <div id="group-chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-4 flex gap-4 glass border-t border-white/5">
            <input id="group-message-input" class="input-field flex-1" placeholder="Message...">
            <button onclick="sendGroupMessage()" class="btn-brand px-8">Send</button>
        </div>
    </div>

    <div id="app">
        <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] text-center shadow-2xl">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-2xl">
                <h1 class="text-4xl font-black mb-8 italic">Open<span class="text-brandOrange">Class</span></h1>
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="student">Student Account</option>
                        <option value="teacher">Teacher Account</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button onclick="handleAuth()" id="primary-auth-btn" class="w-full py-4 btn-brand">Sign In</button>
                    <button onclick="handleGoogle()" class="w-full py-4 glass dark:text-white light:text-brandBlue rounded-2xl font-bold uppercase text-[10px] flex items-center justify-center gap-4 border border-zinc-500/20">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Continue with Google
                    </button>
                    <button onclick="toggleAuth()" id="toggle-auth-btn" class="w-full text-[10px] text-zinc-500 font-bold uppercase mt-6 hover:text-brandOrange">Create New Profile</button>
                </div>
            </div>
        </div>

        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-5 glass border-b border-white/5 sticky top-0 z-[1000] flex flex-col md:flex-row gap-6 justify-between px-10 items-center">
                <div class="flex items-center gap-4 cursor-pointer" onclick="navigate('home')">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-10 rounded-xl">
                    <h2 class="text-2xl font-black italic tracking-tighter">Open<span class="text-brandOrange">Class</span></h2>
                </div>
                <div class="flex items-center gap-6 w-full md:w-auto relative">
                    <div class="relative w-full md:w-96 group">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="8" cy="8" r="6"/><path d="M13 13l4 4"/></svg></div>
                        <input type="text" id="g-search" oninput="reactiveSearch(this.value)" placeholder="Search Instructors, Lessons, or Groups..." class="input-field rounded-2xl pl-12 pr-6 py-2.5 text-sm w-full">
                    </div>
                    <button onclick="toggleMode()" class="p-2 glass rounded-xl">🌓</button>
                    <div id="nav-profile-pic" class="w-10 h-10 rounded-full border-2 border-brandOrange/30 overflow-hidden hidden md:block"></div>
                    <button onclick="logout()" class="text-[10px] font-black text-red-500 uppercase px-4 py-2 border border-red-500/20 rounded-xl">Logout</button>
                </div>
            </nav>
            <main id="main-content" class="p-10 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <div id="onboarding-screen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[3.5rem] border-brandOrange/20 shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-6 italic">Setup Profile</h2>
            <div class="space-y-4">
                <input type="text" id="ob-name" placeholder="Full Name" class="input-field">
                <select id="ob-role" class="input-field">
                    <option value="student">Student Account</option>
                    <option value="teacher">Teacher Account</option>
                </select>
                <input type="password" id="ob-pass" placeholder="Create Access Password" class="input-field">
                <button onclick="finalizeProfile()" class="w-full py-5 btn-brand">Activate</button>
            </div>
        </div>
    </div>

    <div onclick="toggleAIChat()" class="fixed bottom-6 right-6 z-[5000] w-16 h-16 rounded-full btn-brand flex items-center justify-center text-3xl cursor-pointer shadow-2xl">🤖</div>
    <div id="ai-chat-window" class="hidden fixed bottom-24 right-6 w-[380px] h-[600px] glass rounded-[2rem] z-[5000] overflow-hidden flex flex-col border border-brandOrange/20">
        <div class="p-5 border-b border-white/10 flex justify-between items-center"><h2 class="font-black text-lg italic">OpenClass AI</h2><button onclick="toggleAIChat()">✕</button></div>
        <div id="ai-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-4 border-t border-white/10 flex gap-3"><input id="ai-input" type="text" placeholder="Ask AI..." class="input-field flex-1"><button onclick="sendAIMessage()" class="btn-brand px-5 rounded-xl">Send</button></div>
    </div>

    <script type="module">
        import * as Core from "./app.js";
        import { aiConfig } from "./config.js";

        let profile = null, isSignup = false, otpCode = null, tempUser = null, activeGroupId = null;

        window.reactiveSearch = (val) => {
            if (val.length < 2) return;
            navigate('search', val);
        };

        window.onpopstate = (e) => { if (profile) renderContent(e.state?.p || 'home', e.state?.q || ''); };
        window.navigate = (p, q = '') => { history.pushState({ p, q }, '', `#${p}`); renderContent(p, q); };

        async function renderContent(p, q) {
            if (p === 'home') loadHome();
            else if (p === 'search') loadSearch(q);
            else if (p === 'profile') viewTeacher(q);
        }

        // --- DASHBOARD RENDERING ---
        window.loadHome = async () => {
            const main = document.getElementById('main-content');
            if (profile.role === 'teacher') {
                const contentSnap = await Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "==", profile.teacherId)));
                const followersSnap = await Core.getDocs(Core.query(Core.collection(Core.db, "users"), Core.where("subs", "array-contains", profile.teacherId)));
                
                main.innerHTML = `
                <div class="grid lg:grid-cols-3 gap-10">
                    <div class="space-y-6 lg:sticky lg:top-32 h-fit">
                        <div class="glass p-8 rounded-[3rem] border border-brandOrange/20 text-center shadow-xl">
                            <img src="${profile.photo || ''}" class="w-24 h-24 mx-auto mb-4 rounded-full border-2 border-brandOrange p-1 object-cover bg-brandBlue">
                            <h3 class="text-xl font-black italic">${profile.name}</h3>
                            <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-6">${profile.teacherId}</p>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-white/5 p-4 rounded-3xl text-center"><p class="text-[9px] opacity-30 font-bold uppercase">Followers</p><p class="text-2xl font-black">${followersSnap.size}</p></div>
                                <div class="bg-white/5 p-4 rounded-3xl text-center"><p class="text-[9px] opacity-30 font-bold uppercase">Posts</p><p class="text-2xl font-black">${contentSnap.size}</p></div>
                            </div>
                        </div>
                        <div class="glass p-4 rounded-[2rem] flex gap-2">
                            <button onclick="switchTeacherView('create')" class="flex-1 py-3 rounded-xl bg-white/5 text-[10px] font-black uppercase hover:bg-brandOrange transition-all">Create Hub</button>
                            <button onclick="switchTeacherView('requests')" class="flex-1 py-3 rounded-xl bg-white/5 text-[10px] font-black uppercase hover:bg-brandOrange transition-all">Requests</button>
                        </div>
                        <div id="teacher-action-area" class="glass p-8 rounded-[3rem] space-y-4">
                            <h3 class="text-xl font-black italic text-brandOrange">Publish Resources</h3>
                            <input id="up-t" placeholder="Resource Title" class="input-field">
                            <input id="up-u" placeholder="Link (YouTube, Google Drive)" class="input-field">
                            <select id="up-y" class="input-field">
                                <option value="video">Video Lecture</option>
                                <option value="live">Live Stream</option>
                                <option value="file">File / PDF</option>
                            </select>
                            <button onclick="publishContent()" class="w-full py-4 btn-brand">Publish Now</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 space-y-12">
                        <section>
                            <h3 class="text-xs font-black uppercase opacity-40 ml-4 mb-4">My Hubs</h3>
                            <div id="student-groups" class="space-y-4"></div>
                        </section>
                        <section>
                            <h3 class="text-xs font-black uppercase opacity-40 ml-4 mb-4">Content Feed</h3>
                            <div id="feed" class="space-y-4"></div>
                        </section>
                    </div>
                </div>`;
                renderFeed(contentSnap.docs, true);
                loadGroups();
            } else {
                main.innerHTML = `
                <div class="max-w-4xl mx-auto space-y-12">
                    <section>
                        <h3 class="text-2xl font-black italic mb-6">Subscriptions</h3>
                        <div id="student-groups" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </section>
                    <section>
                        <h3 class="text-xs font-black uppercase opacity-40 ml-4 mb-6">Recent Resources</h3>
                        <div id="feed" class="space-y-6"></div>
                    </section>
                </div>`;
                if (profile.subs?.length) {
                    const snap = await Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "in", profile.subs)));
                    renderFeed(snap.docs, false);
                }
                loadGroups();
            }
        };

        // --- SEARCH ENGINE ---
        window.loadSearch = async (q) => {
            const main = document.getElementById('main-content');
            if(!q) return loadHome();
            main.innerHTML = `<div class="space-y-4">${Array(3).fill('<div class="skeleton h-20 rounded-2xl"></div>').join('')}</div>`;

            const [usersSnap, contentSnap, groupsSnap] = await Promise.all([
                Core.getDocs(Core.collection(Core.db, "users")),
                Core.getDocs(Core.collection(Core.db, "content")),
                Core.getDocs(Core.collection(Core.db, "groups"))
            ]);

            const teachers = usersSnap.docs.filter(d => d.data().role === 'teacher' && (d.data().name.toLowerCase().includes(q.toLowerCase()) || d.data().teacherId === q));
            const content = contentSnap.docs.filter(d => d.data().title.toLowerCase().includes(q.toLowerCase()));
            const groups = groupsSnap.docs.filter(d => d.data().code === q || d.data().name.toLowerCase().includes(q.toLowerCase()));

            main.innerHTML = `
            <div class="space-y-12 animate-in fade-in duration-300">
                ${teachers.length ? `<div><h3 class="text-xs font-black uppercase opacity-40 mb-4 ml-4">Instructors</h3><div class="grid gap-4">${teachers.map(m => `
                    <div onclick="navigate('profile', '${m.data().teacherId}')" class="glass p-6 rounded-[2.5rem] flex justify-between items-center cursor-pointer hover:border-brandOrange/40 transition-all group">
                        <div class="flex items-center gap-6"><img src="${m.data().photo || ''}" class="w-16 h-16 rounded-2xl object-cover bg-brandBlue shadow-lg">
                        <div><h3 class="text-2xl font-black italic tracking-tighter">${m.data().name}</h3><p class="text-[10px] opacity-30 font-bold">${m.data().teacherId}</p></div></div>
                        <p class="text-brandOrange font-black uppercase text-[10px]">View Profile →</p></div>`).join('')}</div></div>` : ''}

                ${groups.length ? `<div><h3 class="text-xs font-black uppercase opacity-40 mb-4 ml-4">Groups</h3><div class="grid gap-4">${groups.map(g => `
                    <div class="glass p-6 rounded-[2.5rem] flex justify-between items-center group border border-white/5">
                        <div><span class="text-[9px] text-brandOrange font-black uppercase tracking-widest">${g.data().type}</span><h3 class="text-xl font-black mt-1">${g.data().name}</h3><p class="text-xs opacity-50">${g.data().code}</p></div>
                        <button onclick="handleJoinRequest('${g.id}','${g.data().code}')" class="btn-brand px-8 py-2 text-[10px]">Access Hub</button></div>`).join('')}</div></div>` : ''}

                ${content.length ? `<div><h3 class="text-xs font-black uppercase opacity-40 mb-4 ml-4">Lessons</h3><div class="grid gap-4">${content.map(d => renderResourceCard(d, false)).join('')}</div></div>` : ''}
            </div>`;
        };

        window.handleJoinRequest = (gid, code) => {
            document.getElementById('g-search').value = code;
            joinGroup();
        };

        // --- TEACHER MODERATION ---
        window.switchTeacherView = async (view) => {
            const area = document.getElementById('teacher-action-area');
            if(view === 'create') {
                area.innerHTML = `
                    <h3 class="text-xl font-black italic text-brandOrange">Hub Creator</h3>
                    <select id="group-type" class="input-field mb-3"><option value="public">Public (Instant)</option><option value="private">Private (Approval)</option></select>
                    <input id="group-name" placeholder="Hub Name" class="input-field mb-4">
                    <button onclick="createGroup()" class="w-full py-4 btn-brand">Create</button>`;
            } else if(view === 'requests') {
                area.innerHTML = `<h3 class="text-xl font-black italic text-brandOrange">Join Requests</h3><div id="request-list" class="space-y-3">Scanning...</div>`;
                const groups = await Core.getDocs(Core.query(Core.collection(Core.db, "groups"), Core.where("teacherId", "==", profile.teacherId)));
                let reqHtml = '';
                groups.forEach(g => {
                    const data = g.data();
                    if(data.pending?.length) {
                        data.pending.forEach(p => {
                            reqHtml += `<div class="bg-white/5 p-4 rounded-2xl flex flex-col gap-3 border border-white/5">
                                <div><p class="text-[9px] text-brandOrange font-black uppercase">${data.name}</p><p class="font-bold text-sm">${p.name}</p></div>
                                <div class="flex gap-2"><button onclick="handleRequest('${g.id}','${p.uid}','${p.name}',true)" class="flex-1 py-2 bg-green-600 rounded-xl text-[9px] font-black uppercase">Approve</button>
                                <button onclick="handleRequest('${g.id}','${p.uid}','${p.name}',false)" class="flex-1 py-2 bg-red-600 rounded-xl text-[9px] font-black uppercase">Reject</button></div></div>`;
                        });
                    }
                });
                document.getElementById('request-list').innerHTML = reqHtml || '<p class="opacity-30 text-[9px] font-bold text-center py-10 uppercase">Clear Records</p>';
            }
        };

        window.handleRequest = async (gid, uid, name, accept) => {
            const ref = Core.doc(Core.db, "groups", gid);
            if(accept) await Core.updateDoc(ref, { members: Core.arrayUnion(uid), pending: Core.arrayRemove({uid, name}) });
            else await Core.updateDoc(ref, { pending: Core.arrayRemove({uid, name}) });
            toast(accept ? "Accepted" : "Rejected"); switchTeacherView('requests');
        };

        // --- AUTH ---
        window.handleAuth = async () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if (isSignup) {
                tempUser = { e, p, n: document.getElementById('reg-name').value, r: document.getElementById('reg-role').value };
                otpCode = Math.floor(100000 + Math.random() * 900000);
                await Core.sendOTP(e, otpCode); toast("OTP Sent");
            } else { try { await Core.signInWithEmailAndPassword(Core.auth, e, p); } catch(err) { toast(err.message, "error"); } }
        };

        window.toggleAuth = () => {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-auth-btn').innerText = isSignup ? "Create Profile" : "Sign In";
        };

        window.handleGoogle = () => Core.signInWithPopup(Core.auth, Core.provider);
        window.logout = () => Core.signOut(Core.auth).then(() => location.reload());

        // --- GROUP & CONTENT CORE ---
        window.createGroup = async () => {
            const name = document.getElementById('group-name').value, type = document.getElementById('group-type').value;
            if(!name) return toast("Name Required");
            const code = "OC-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            await Core.addDoc(Core.collection(Core.db, "groups"), { name, type, code, teacherId: profile.teacherId, teacherName: profile.name, members: [Core.auth.currentUser.uid], pending: [], createdAt: Core.serverTimestamp() });
            toast("Hub Created!"); loadHome();
        };

        window.joinGroup = async () => {
            const code = document.getElementById('g-search').value.trim();
            const snap = await Core.getDocs(Core.query(Core.collection(Core.db, "groups"), Core.where("code", "==", code)));
            if(snap.empty) return toast("Invalid Code", "error");
            const g = snap.docs[0], d = g.data();
            if(d.members.includes(Core.auth.currentUser.uid)) return toast("Already Member");
            if(d.type === 'public') await Core.updateDoc(Core.doc(Core.db, "groups", g.id), { members: Core.arrayUnion(Core.auth.currentUser.uid) });
            else await Core.updateDoc(Core.doc(Core.db, "groups", g.id), { pending: Core.arrayUnion({uid: Core.auth.currentUser.uid, name: profile.name}) });
            toast("Hub Synced"); loadHome();
        };

        window.deleteGroup = async (id) => {
            if(confirm("Permanently delete this hub?")) {
                await Core.deleteDoc(Core.doc(Core.db, "groups", id));
                toast("Hub Deleted"); loadHome();
            }
        };

        window.loadGroups = async () => {
            const container = document.getElementById('student-groups');
            const snap = await Core.getDocs(Core.collection(Core.db, "groups"));
            container.innerHTML = snap.docs.filter(d => d.data().members?.includes(Core.auth.currentUser.uid) || d.data().teacherId === profile.teacherId).map(docSnap => {
                const g = docSnap.data();
                const isTeacher = g.teacherId === profile.teacherId;
                return `<div class="glass p-6 rounded-[2rem] flex justify-between items-center border border-white/5 hover:border-brandOrange/20 transition-all group">
                    <div><span class="text-[9px] text-brandOrange font-black uppercase tracking-widest">${g.type}</span><h3 class="text-xl font-black">${g.name}</h3><p class="text-xs opacity-40">${g.code}</p></div>
                    <div class="flex gap-2">
                        <button onclick="openGroupChat('${docSnap.id}', '${g.name}')" class="btn-brand px-6 py-2 text-[10px]">Open Hub</button>
                        ${isTeacher ? `<button onclick="deleteGroup('${docSnap.id}')" class="bg-red-500/10 text-red-500 p-2 rounded-xl">🗑</button>` : ''}
                    </div></div>`;
            }).join('');
        };

        function renderFeed(docs, isT) { document.getElementById('feed').innerHTML = docs.map(d => renderResourceCard(d, isT)).join(''); }
        function renderResourceCard(d, isT) {
            const i = d.data();
            const isLive = i.type === 'live';
            return `<div class="glass p-5 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center group shadow-xl gap-6 border border-white/5">
                <div class="flex items-center gap-6 w-full md:w-auto">
                    <div class="relative">
                        <img src="${Core.getThumbnail(i.url)}" class="w-32 h-20 rounded-2xl object-cover bg-brandBlue shadow-md">
                        ${isLive ? '<span class="absolute top-2 left-2 bg-red-600 text-[8px] font-black px-2 py-0.5 rounded-full animate-pulse">LIVE</span>' : ''}
                    </div>
                    <div><h4 class="font-black text-lg italic truncate">${i.title}</h4><p class="text-[9px] opacity-40 uppercase font-bold">${i.tName} • ${i.views || 0} Views</p></div>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="openResource('${d.id}','${i.url}','${i.title}')" class="flex-grow md:flex-none bg-white text-black px-10 py-3 rounded-2xl font-black text-[10px] uppercase">Watch</button>
                    ${isT ? `<button onclick="openDelete('${d.id}')" class="p-3 bg-zinc-800 rounded-xl hover:text-red-500 transition-all">🗑</button>` : ''}
                </div></div>`;
        }

        window.publishContent = async () => {
            const t = document.getElementById('up-t').value, u = document.getElementById('up-u').value, y = document.getElementById('up-y').value;
            if(!t || !u) return toast("Missing Fields", "error");
            await Core.addDoc(Core.collection(Core.db, "content"), { title: t, url: u, type: y, tId: profile.teacherId, tName: profile.name, views: 0, date: Core.serverTimestamp() });
            toast("Published!"); loadHome();
        };

        window.openResource = async (id, url, title) => {
            await Core.updateDoc(Core.doc(Core.db, "content", id), { views: Core.increment(1) });
            let vid = "";
            if(url.includes('v=')) vid = url.split('v=')[1].split('&')[0];
            else if(url.includes('youtu.be/')) vid = url.split('/').pop().split('?')[0];
            else if(url.includes('/live/')) vid = url.split('/live/')[1].split('?')[0];
            const embed = `https://www.youtube.com/embed/${vid}?autoplay=1&modestbranding=1&rel=0`;
            document.getElementById('vault-frame').src = embed;
            document.getElementById('media-vault').classList.remove('hidden');
        };

        // --- GROUP CHAT ENGINE (FIXED) ---
        window.openGroupChat = (id, name) => {
            activeGroupId = id; 
            document.getElementById('group-chat-window').classList.remove('hidden');
            document.getElementById('group-chat-title').innerText = name;
            const q = Core.query(Core.collection(Core.db, "groupMessages"), Core.where("groupId", "==", id), Core.orderBy("createdAt", "asc"));
            Core.onSnapshot(q, (snap) => {
                document.getElementById('group-chat-messages').innerHTML = snap.docs.map(m => {
                    const data = m.data();
                    const isMe = data.senderId === Core.auth.currentUser.uid;
                    return `<div class="${isMe ? 'text-right' : ''}"><div class="inline-block p-4 rounded-2xl ${isMe ? 'bg-brandOrange' : 'bg-white/10'} text-sm">${data.text}</div></div>`;
                }).join('');
                document.getElementById('group-chat-messages').scrollTop = 99999;
            });
        };

        window.sendGroupMessage = async () => {
            const input = document.getElementById('group-message-input'), text = input.value.trim();
            if(!text || !activeGroupId) return;
            await Core.addDoc(Core.collection(Core.db, "groupMessages"), { groupId: activeGroupId, senderId: Core.auth.currentUser.uid, text, createdAt: Core.serverTimestamp() });
            input.value = '';
        };

        // --- SMART AI ASSISTANT ---
        window.sendAIMessage = async () => {
            const input = document.getElementById('ai-input'), msg = input.value.trim();
            if(!msg) return;
            const chat = document.getElementById('ai-messages');
            chat.innerHTML += `<div class="ml-auto bg-brandOrange text-white p-4 rounded-2xl max-w-[80%] text-sm">${msg}</div>`;
            input.value = '';
            
            // Get data for context
            const currentHash = window.location.hash || '#home';
            const contextData = `
                User: ${profile.name} (${profile.role})
                Current Screen: ${currentHash}
                Active GroupID: ${activeGroupId || 'None'}
                Account Joined: ${profile.joined || 'Unknown'}
            `;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${aiConfig.geminiKey}`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `
                        System Context: ${contextData}
                        Instructions: You are the OpenClass Smart Assistant. You help the user based on their specific role and screen. 
                        If they are a student, encourage them. If they are a teacher, help them manage content.
                        User Message: ${msg}` }] }] })
                });
                const data = await res.json();
                chat.innerHTML += `<div class="bg-white/10 p-4 rounded-2xl max-w-[80%] text-sm">${data.candidates[0].content.parts[0].text}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch(e) { toast("AI Error", "error"); }
        };

        // --- GLOBAL OBSERVER ---
        Core.onAuthStateChanged(Core.auth, async (user) => {
            if (user) {
                const docSnap = await Core.getDoc(Core.doc(Core.db, "users", user.uid));
                if (!docSnap.exists()) showScreen('onboarding-screen');
                else {
                    profile = docSnap.data();
                    if (profile.photo) document.getElementById('nav-profile-pic').innerHTML = `<img src="${profile.photo}" class="w-full h-full object-cover">`;
                    document.getElementById('nav-profile-pic').classList.remove('hidden');
                    showScreen('dashboard'); navigate(window.location.hash.substring(1) || 'home');
                }
            } else showScreen('auth-screen');
        });

        window.toggleAIChat = () => document.getElementById('ai-chat-window').classList.toggle('hidden');
        window.closeGroupChat = () => document.getElementById('group-chat-window').classList.add('hidden');
        window.toggleMode = () => { document.documentElement.classList.toggle('light'); localStorage.setItem('oc_theme', document.documentElement.classList.contains('light')); };
        window.closeVault = () => { document.getElementById('media-vault').classList.add('hidden'); document.getElementById('vault-frame').src=""; };
        function showScreen(id) { ['auth-screen','onboarding-screen', 'dashboard'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function toast(m, type="s") { const b = document.getElementById('toast-box'), d = document.createElement('div'); d.className='toast-pill'; if(type==="error") d.style.borderColor="red"; d.innerText=m; b.appendChild(d); setTimeout(()=>d.remove(), 2500); }
        if (localStorage.getItem('oc_theme') === 'true') document.documentElement.classList.add('light');
    </script>
</body>
</html>
