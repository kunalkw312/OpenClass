<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass Pro | Secure LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-orange { background: #f97316; transition: all 0.3s; }
        .btn-orange:hover { background: #ea580c; transform: translateY(-1px); box-shadow: 0 10px 20px -10px #f97316; }
        .input-field { background: #111; border: 1px solid #222; padding: 14px; border-radius: 12px; width: 100%; outline: none; color: white; }
        .input-field:focus { border-color: #f97316; }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="no-select">

    <div id="app">
        <!-- Auth Screen -->
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[2.5rem]">
                <h1 class="text-5xl font-black text-orange-500 text-center mb-2 tracking-tighter">OpenClass</h1>
                <p id="auth-subtitle" class="text-center text-zinc-500 text-[10px] uppercase tracking-[0.3em] mb-8 font-bold">Secure Campus Login</p>

                <div class="space-y-4">
                    <div id="signup-fields" class="hidden space-y-4">
                        <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                        <input type="text" id="reg-inst" placeholder="Institute Name" class="input-field">
                        <select id="reg-role" class="input-field">
                            <option value="STUDENT">Student Account</option>
                            <option value="TEACHER">Teacher Account</option>
                        </select>
                    </div>
                    <input type="email" id="auth-email" placeholder="Email Address" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-orange rounded-xl font-black uppercase tracking-widest mt-4">Login</button>
                    <p class="text-center text-[10px] text-zinc-600 mt-8 uppercase font-bold tracking-widest">
                        <button onclick="toggleAuthMode()" class="hover:text-orange-500 transition-colors">Switch Mode (Login/Signup)</button>
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-4 border-b border-zinc-900 glass flex justify-between items-center sticky top-0 z-50">
                <h2 class="text-xl font-black text-orange-500 tracking-tighter uppercase">OpenClass</h2>
                <div class="flex items-center gap-4">
                    <div class="text-right leading-tight">
                        <p id="nav-name" class="text-xs font-bold"></p>
                        <p id="nav-id" class="text-[10px] text-zinc-600 font-mono"></p>
                    </div>
                    <button onclick="logout()" class="p-2 bg-zinc-900 rounded-full text-zinc-500 hover:text-red-500 font-bold">✕</button>
                </div>
            </nav>
            <main id="dashboard-content" class="p-6 max-w-5xl mx-auto w-full"></main>
        </div>
    </div>

    <!-- OTP MODAL -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[2rem] text-center border-orange-500/30">
            <h3 class="text-2xl font-bold mb-2">Verify Email</h3>
            <p class="text-zinc-500 text-sm mb-8">Enter the 6-digit code sent to your inbox.</p>
            <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-3xl font-black tracking-[0.5em] mb-6">
            <button id="otp-verify-btn" onclick="verifyOtp()" class="w-full py-4 btn-orange rounded-xl font-black uppercase tracking-widest">Verify & Access</button>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-modal" class="hidden fixed inset-0 z-[100] bg-black flex items-center justify-center">
        <button onclick="closePlayer()" class="absolute top-8 right-8 text-zinc-500 hover:text-white text-2xl">✕ Close</button>
        <div class="relative w-full max-w-5xl aspect-video rounded-3xl overflow-hidden shadow-2xl border border-zinc-800 bg-black">
            <div class="absolute inset-0 z-10 bg-transparent" oncontextmenu="return false;"></div> 
            <iframe id="main-player" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        const CONFIG = {
            SHEET_URL: "https://script.google.com/macros/s/AKfycbzAnYrC9_hcHOgO24KLr2thGeEZvCM28l52qb2cUh88CTlDJPsxhON11oy9dl4bhsNmtQ/exec",
            EMAILJS_PUB: "P88qoYcr5CHYVNAPw",
            EMAILJS_SVC: "service_djr1n0f",
            EMAILJS_TMP: "template_tiqnb53"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false;
        let generatedOtp = null;
        let pendingPayload = null;

        if(user) renderUI();

        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('auth-subtitle').innerText = isSignup ? "Create Profile" : "Secure Campus Login";
            document.getElementById('primary-btn').innerText = isSignup ? "Send OTP Code" : "Login";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Please fill all fields");

            if(isSignup) {
                generatedOtp = Math.floor(100000 + Math.random() * 900000);
                pendingPayload = { 
                    action: "signup", 
                    payload: { 
                        email: email.trim(), password: pass, 
                        name: document.getElementById('reg-name').value, 
                        role: document.getElementById('reg-role').value,
                        institute: document.getElementById('reg-inst').value 
                    }
                };
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: generatedOtp });
                document.getElementById('otp-modal').classList.remove('hidden');
            } else {
                const res = await fetch(CONFIG.URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "login", payload: { email: email.trim(), password: pass }}) 
                });
                const data = await res.json();
                if(data.email) {
                    localStorage.setItem('oc_user', JSON.stringify(data));
                    user = data;
                    renderUI();
                } else { alert(data); }
            }
        }

        async function verifyOtp() {
            const val = document.getElementById('otp-input').value;
            const btn = document.getElementById('otp-verify-btn');
            if(val == generatedOtp) {
                btn.innerText = "Creating Account...";
                btn.disabled = true;
                const response = await fetch(CONFIG.URL, { method: 'POST', body: JSON.stringify(pendingPayload) });
                const result = await response.json();
                if(result === "Success") {
                    alert("Account Created! You can now login.");
                    location.reload();
                } else {
                    alert(result);
                    document.getElementById('otp-modal').classList.add('hidden');
                }
            } else { alert("Invalid OTP"); }
        }

        function renderUI() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('nav-name').innerText = user.name;
            document.getElementById('nav-id').innerText = user.teacherId || "Student Account";
            
            const main = document.getElementById('dashboard-content');
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="md:col-span-2 space-y-6">
                            <div class="glass p-8 rounded-[2rem] space-y-4">
                                <h3 class="text-xs font-bold text-orange-500 uppercase tracking-widest">Publish New Resource</h3>
                                <input id="l-title" placeholder="Lesson Title" class="input-field">
                                <input id="l-url" placeholder="YouTube or PDF URL" class="input-field">
                                <button onclick="publishLesson()" class="w-full py-4 btn-orange rounded-xl font-bold uppercase">Publish Live</button>
                            </div>
                            <div id="lesson-list" class="space-y-3"></div>
                        </div>
                        <div class="glass p-8 rounded-[2rem] h-fit">
                            <p class="text-orange-500 font-bold uppercase text-[10px] mb-2 tracking-widest">Teacher ID</p>
                            <p class="text-3xl font-black">${user.teacherId}</p>
                        </div>
                    </div>
                `;
                loadLessons(user.teacherId);
            } else {
                main.innerHTML = `
                    <div class="max-w-2xl mx-auto space-y-8">
                        <div class="flex gap-2">
                            <input id="search-id" placeholder="Enter Teacher ID (OC-NAME123)" class="input-field">
                            <button onclick="searchTeacher()" class="btn-orange px-8 rounded-xl font-bold uppercase">Find</button>
                        </div>
                        <div id="lesson-list" class="grid gap-3"></div>
                    </div>
                `;
            }
        }

        async function publishLesson() {
            const title = document.getElementById('l-title').value;
            const url = document.getElementById('l-url').value;
            if(!title || !url) return alert("Fill all fields");
            await fetch(CONFIG.URL, { method: 'POST', body: JSON.stringify({ action: "save_content", payload: { teacherId: user.teacherId, title, url, type: url.includes('.pdf') ? 'PDF' : 'VIDEO' }}) });
            alert("Published!");
            loadLessons(user.teacherId);
        }

        async function loadLessons(id) {
            const res = await fetch(CONFIG.URL + "?teacherId=" + id.toUpperCase());
            const data = await res.json();
            const list = document.getElementById('lesson-list');
            list.innerHTML = data.map(item => `
                <div class="glass p-5 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-orange-500">
                            ${item.type === 'VIDEO' ? '▶' : '📄'}
                        </div>
                        <div>
                            <p class="font-bold text-sm">${item.title}</p>
                            <p class="text-[10px] text-zinc-500 uppercase font-bold">${item.views || 0} Views • ${item.type}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openMedia('${item.id}', '${item.url}', '${item.type}')" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Access</button>
                        ${user.role === 'TEACHER' ? `<button onclick="deleteLesson('${item.id}')" class="text-zinc-600">🗑️</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function deleteLesson(id) {
            if(!confirm("Delete this lesson?")) return;
            await fetch(CONFIG.URL, { method: 'POST', body: JSON.stringify({ action: "delete_content", payload: { id }}) });
            loadLessons(user.teacherId);
        }

        function openMedia(id, url, type) {
            fetch(CONFIG.URL, { method: 'POST', body: JSON.stringify({ action: "track_view", payload: { id }}) });
            if(type === 'VIDEO') {
                let vid = "";
                if(url.includes("v=")) vid = url.split("v=")[1].split("&")[0];
                else if(url.includes("youtu.be/")) vid = url.split("youtu.be/")[1];
                document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1&modestbranding=1&rel=0`;
                document.getElementById('player-modal').classList.remove('hidden');
            } else { window.open(url, '_blank'); }
        }

        function searchTeacher() {
            const id = document.getElementById('search-id').value.trim();
            if(id) loadLessons(id);
        }

        function closePlayer() {
            document.getElementById('player-modal').classList.add('hidden');
            document.getElementById('main-player').src = "";
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
