<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Professional Secure LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brandBlue: '#004a80', brandOrange: '#f7941d', offWhite: '#fdfbf7' }
                }
            }
        }
    </script>
    <style>
        :root { --text-main: #fdfbf7; --bg-main: #050505; --glass-bg: rgba(15, 15, 15, 0.85); --input-bg: #111; }
        .light { --text-main: #002e50; --bg-main: #fdfbf7; --glass-bg: rgba(255, 255, 255, 0.8); --input-bg: #fff; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: background-color 0.4s; overflow-x: hidden; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid rgba(128,128,128,0.15); }
        .btn-brand { background: linear-gradient(135deg, #004a80 0%, #f7941d 100%); background-size: 200% auto; transition: 0.4s; }
        .btn-brand:hover { background-position: right center; transform: translateY(-1px); }

        /* Minimalist Smart Toast */
        #toast-box { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast-pill { background: #111; color: #fff; padding: 0.5rem 1.2rem; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 0 10px 20px rgba(0,0,0,0.5); animation: popUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        @keyframes popUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Vault Loader Animation */
        .vault-spinner { width: 60px; height: 60px; border: 4px solid rgba(247, 148, 29, 0.1); border-left-color: #f7941d; border-radius: 50%; animation: vaultSpin 1s linear infinite; }
        @keyframes vaultSpin { 100% { transform: rotate(360deg); } }

        .input-field { background: var(--input-bg); border: 1px solid rgba(128,128,128,0.25); color: var(--text-main); outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #f7941d; box-shadow: 0 0 0 4px rgba(247, 148, 29, 0.1); }
        .skeleton { background: linear-gradient(90deg, rgba(128,128,128,0.1) 25%, rgba(128,128,128,0.2) 50%, rgba(128,128,128,0.1) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="selection:bg-brandOrange/30">

    <div id="toast-box"></div>

    <!-- Media Vault with Integrated Loader -->
    <div id="media-vault" class="hidden fixed inset-0 z-[500] bg-black flex flex-col">
        <nav class="p-4 glass border-b border-white/5 flex justify-between items-center px-6">
            <div class="flex items-center gap-3">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-8 rounded" alt="Logo">
                <h3 id="vault-title" class="font-black text-xs uppercase italic tracking-tighter"><span class="text-offWhite">Open</span><span class="text-brandOrange">Class</span></h3>
            </div>
            <button onclick="closeVault()" class="bg-zinc-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:text-red-500 transition-colors">Close (ESC)</button>
        </nav>
        <div class="flex-grow relative flex items-center justify-center p-2 bg-zinc-950">
            <!-- Loader within the vault -->
            <div id="vault-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-10">
                <div class="vault-spinner"></div>
                <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-brandOrange">Decrypting Secure Resource...</p>
            </div>
            <iframe id="vault-frame" class="w-full aspect-video md:h-full max-w-6xl rounded-2xl shadow-2xl bg-black" allowfullscreen onload="document.getElementById('vault-loader').classList.add('hidden')"></iframe>
        </div>
    </div>

    <div id="app">
        <!-- Auth View -->
        <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[3rem] shadow-2xl text-center border-white/10">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-2xl" alt="Logo">
                <h1 class="text-4xl font-black mb-10 italic tracking-tighter">
                    <span class="dark:text-white light:text-brandBlue">Open</span><span class="text-brandOrange">Class</span>
                </h1>
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field w-full p-4 rounded-xl">
                    <select id="reg-role" class="input-field w-full p-4 rounded-xl">
                        <option value="STUDENT">Student Account</option>
                        <option value="TEACHER">Teacher Account</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Campus Email" class="input-field w-full p-4 rounded-xl">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field w-full p-4 rounded-xl">
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-brand text-white rounded-2xl font-black uppercase tracking-widest shadow-lg">Sign In</button>
                    <button onclick="toggleAuthMode()" id="toggle-auth-btn" class="w-full text-[10px] text-zinc-500 font-bold uppercase mt-4">Create Account</button>
                </div>
                <button onclick="toggleDarkMode()" class="mt-8 text-[9px] font-black uppercase tracking-widest opacity-40">🌓 Toggle Mode</button>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-4 glass border-b border-white/5 sticky top-0 z-50 flex flex-col md:flex-row gap-4 justify-between px-6 md:px-10 items-center">
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-10 rounded-xl cursor-pointer" onclick="navigate('home')">
                    <h2 class="text-xl font-black italic cursor-pointer" onclick="navigate('home')">
                        <span class="dark:text-white light:text-brandBlue">Open</span><span class="text-brandOrange">Class</span>
                    </h2>
                </div>
                <div class="relative w-full md:w-auto flex items-center">
                    <input type="text" id="g-search" onkeyup="if(event.key==='Enter') navigate('search', this.value)" placeholder="Search Campus..." class="input-field rounded-l-2xl px-6 py-2.5 text-sm w-full md:w-80">
                    <button onclick="navigate('search', document.getElementById('g-search').value)" class="bg-brandOrange p-3 rounded-r-2xl text-white shadow-lg shadow-brandOrange/20">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3"><circle cx="8" cy="8" r="5"/><path d="M12 12l4 4"/></svg>
                    </button>
                </div>
                <div class="flex items-center gap-6">
                    <button onclick="toggleDarkMode()" class="p-2 glass rounded-full">🌓</button>
                    <button onclick="logout()" class="text-[10px] font-black text-red-500 uppercase tracking-widest transition-colors">Logout</button>
                </div>
            </nav>
            <main id="main-content" class="p-6 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[600] bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass p-8 rounded-[3rem] text-center border border-white/5">
            <h3 class="text-2xl font-black mb-2 text-brandOrange italic">Verify Identity</h3>
            <p id="otp-note" class="text-zinc-500 text-[9px] mb-8 uppercase font-bold tracking-widest"></p>
            <input type="number" id="otp-input" class="input-field text-center text-4xl font-black mb-8 w-full p-4 rounded-2xl" placeholder="000000">
            <div class="flex gap-3">
                <button onclick="closeOtp()" class="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold uppercase text-[10px]">Cancel</button>
                <button onclick="verifyOtp()" class="flex-2 px-8 py-4 btn-brand rounded-2xl font-bold uppercase text-[10px] text-white">Verify</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbxII3g79Ri9EOX4zLr3rDgOlTprDwHsr5SEMysBqhh7owEKq9JcI4cVzvozIVdBJT6D8g/exec",
            EMAIL_SVC: "service_djr1n0f", EMAIL_TMP: "template_tiqnb53", EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };
        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user')), isSignup = false, genOtp, pending;

        // Theme Management
        const initTheme = () => document.documentElement.className = localStorage.getItem('oc_theme') || 'dark';
        const toggleDarkMode = () => {
            const target = document.documentElement.className === 'dark' ? 'light' : 'dark';
            document.documentElement.className = target;
            localStorage.setItem('oc_theme', target);
        }
        initTheme();

        // Minimalist Toast
        function toast(msg) {
            const box = document.getElementById('toast-box');
            const el = document.createElement('div');
            el.className = 'toast-pill';
            el.innerText = msg;
            box.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
        }

        // Navigation Support
        window.onpopstate = (e) => {
            if (user) {
                const state = e.state || { page: 'home' };
                renderPage(state.page, state.query);
            }
        };

        function navigate(page, query = '') {
            history.pushState({ page, query }, '', `#${page}${query ? '?q=' + query : ''}`);
            renderPage(page, query);
        }

        function renderPage(page, query) {
            if (!user) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if (page === 'home') loadHome();
            if (page === 'search') executeSearch(query);
        }

        // Authentication Flow
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if (!email || !pass) return toast("Input Required");
            if (isSignup) {
                genOtp = Math.floor(100000 + Math.random() * 900000);
                pending = { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value };
                document.getElementById('otp-note').innerText = `Code sent to ${email}`;
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: genOtp });
                document.getElementById('otp-modal').classList.remove('hidden');
            } else {
                const res = await api("login", { email, password: pass });
                if (res.email) {
                    localStorage.setItem('oc_user', JSON.stringify(res));
                    user = res;
                    navigate('home');
                } else toast(res);
            }
        }

        async function verifyOtp() {
            if (document.getElementById('otp-input').value == genOtp) {
                const res = await api("signup", pending);
                if (res === "Success") {
                    const loginRes = await api("login", { email: pending.email, password: pending.password });
                    localStorage.setItem('oc_user', JSON.stringify(loginRes));
                    user = loginRes;
                    navigate('home');
                    toast("Direct Link Established");
                }
                document.getElementById('otp-modal').classList.add('hidden');
            } else toast("Wrong Code");
        }

        // Home View
        async function loadHome() {
            const main = document.getElementById('main-content');
            main.innerHTML = `<div class="grid gap-6">${Array(4).fill('<div class="skeleton h-32 rounded-3xl"></div>').join('')}</div>`;
            if (user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid lg:grid-cols-3 gap-10">
                        <div class="glass p-8 rounded-[3rem] h-fit sticky top-28 border-white/5">
                            <h3 class="text-brandOrange font-black text-[10px] uppercase mb-6 tracking-widest italic">New Upload</h3>
                            <input id="up-title" placeholder="Topic Title" class="input-field mb-3 w-full p-3 rounded-xl">
                            <input id="up-url" placeholder="Resource Link" class="input-field mb-3 w-full p-3 rounded-xl">
                            <select id="up-type" class="input-field mb-6 w-full p-3 rounded-xl"><option value="VIDEO">Video Lesson</option><option value="FILE">Static Document</option></select>
                            <button onclick="publish()" class="w-full py-4 btn-brand text-white rounded-xl font-bold text-xs uppercase tracking-widest">Publish</button>
                        </div>
                        <div id="feed" class="lg:col-span-2 space-y-4"></div>
                    </div>`;
                const data = await api("search", { email: user.email }, user.teacherId);
                renderFeed(data[0]?.posts || []);
            } else {
                main.innerHTML = `<div id="feed" class="max-w-2xl mx-auto space-y-4"></div>`;
                const data = await api("get_subscribed_feed", { email: user.email });
                renderFeed(data);
            }
        }

        // Search Interface
        async function executeSearch(q) {
            const main = document.getElementById('main-content');
            main.innerHTML = `<div class="skeleton h-32 rounded-[3rem] mb-8"></div><div class="space-y-4">${Array(3).fill('<div class="skeleton h-24 rounded-3xl"></div>').join('')}</div>`;
            const data = await api("search", { email: user.email }, q);
            renderSearchResults(data);
        }

        function renderSearchResults(data) {
            const main = document.getElementById('main-content');
            if (!data.length) { main.innerHTML = `<p class="text-center py-20 opacity-30 font-black uppercase text-[10px] tracking-widest">Sector Empty</p>`; return; }
            const top = data[0];
            main.innerHTML = `
                <div class="space-y-10">
                    <div class="glass p-8 rounded-[3rem] border border-brandOrange/20 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="flex items-center gap-6">
                            <div class="w-16 h-16 btn-brand rounded-2xl flex items-center justify-center text-white text-3xl font-black shadow-lg">${top.name[0]}</div>
                            <div>
                                <h2 class="text-2xl font-black italic">${top.name}</h2>
                                <p class="text-[10px] opacity-60 uppercase font-bold tracking-widest">${top.id} • ${top.postCount} Media</p>
                            </div>
                        </div>
                        <button onclick="handleSubToggle(this, '${top.id}', ${top.isSubscribed})" class="px-10 py-3 ${top.isSubscribed ? 'bg-zinc-800' : 'btn-brand'} text-white rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all">
                            ${top.isSubscribed ? 'Unsubscribe' : 'Subscribe'}
                        </button>
                    </div>
                    <div class="grid gap-4">
                        <h3 class="text-[10px] font-black uppercase opacity-40 ml-6 tracking-widest italic">Related Archives</h3>
                        ${data.flatMap(t => t.posts).map(p => `
                            <div class="glass p-6 rounded-3xl flex justify-between items-center group border border-transparent hover:border-brandOrange/30 transition-all">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-brandBlue/10 rounded-2xl flex items-center justify-center text-brandBlue">${p.type==='VIDEO'?'🎬':'📄'}</div>
                                    <div>
                                        <p class="font-bold text-sm text-zinc-200">${p.title}</p>
                                        <p class="text-[9px] opacity-40 uppercase font-bold tracking-widest">${top.name} • ${p.views || 0} Views</p>
                                    </div>
                                </div>
                                <button onclick="openResource('${p.id}','${p.url}','${p.type}','${p.title}')" class="bg-brandOrange/10 text-brandOrange px-8 py-2 rounded-xl text-[10px] font-black uppercase transition-all hover:bg-brandOrange hover:text-white">Open</button>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        // Secure In-Site Access with Animation
        async function openResource(id, url, type, title) {
            // Show modal and specific loader
            document.getElementById('vault-loader').classList.remove('hidden');
            document.getElementById('media-vault').classList.remove('hidden');
            document.getElementById('vault-title').innerText = title.toUpperCase();
            
            // Increment views in background
            api("track_view", { id });

            let src = url;
            if (type === 'VIDEO') {
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                src = `https://www.youtube.com/embed/${vid}?autoplay=1&modestbranding=1&rel=0`;
            } else if (url.includes('drive.google.com')) {
                src = url.replace('/view', '/preview');
            }
            
            document.getElementById('vault-frame').src = src;
            toast("Accessing Secure Resource");
        }

        // Subscriber Handling
        async function handleSubToggle(btn, tId, isSubbed) {
            btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-2 border-white/30 border-t-white mx-auto"></div>`;
            const action = isSubbed ? "unsubscribe" : "subscribe";
            await api(action, { studentEmail: user.email, teacherId: tId });
            toast(isSubbed ? "Connection Severed" : "Connection Established");
            navigate('search', document.getElementById('g-search').value);
        }

        // Communication Core
        async function api(a, p={}, q="") {
            try {
                const r = await fetch(`${CONFIG.URL}?action=${a}&query=${q}&payload=${encodeURIComponent(JSON.stringify(p))}`);
                return await r.json();
            } catch(e) { return "Latent Signal"; }
        }

        function renderFeed(data) {
            const f = document.getElementById('feed');
            if (!data.length) { f.innerHTML = `<p class="text-center py-20 opacity-30 font-black uppercase text-[10px] tracking-widest">Silence</p>`; return; }
            f.innerHTML = data.map(i => `
                <div class="glass p-8 rounded-[2.5rem] flex justify-between items-center group border border-transparent hover:border-brandOrange/20 transition-all">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 bg-brandBlue/10 rounded-3xl flex items-center justify-center">${i.type==='VIDEO'?'🎬':'📄'}</div>
                        <div>
                            <p class="text-[9px] text-brandOrange font-black uppercase tracking-widest">${i.type}</p>
                            <h4 class="font-black text-xl italic tracking-tight text-zinc-200">${i.title}</h4>
                            <p class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">${i.tName || 'Instructor'} • ${i.views || 0} Views</p>
                        </div>
                    </div>
                    <button onclick="openResource('${i.id}','${i.url}','${i.type}','${i.title}')" class="bg-white text-black px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all">Access</button>
                </div>`).join('');
        }

        async function publish() {
            const t = document.getElementById('up-title').value;
            const u = document.getElementById('up-url').value;
            if(!t || !u) return toast("Missing metadata");
            await api("upload", { teacherId: user.teacherId, teacherName: user.name, title: t, url: u, type: document.getElementById('up-type').value });
            toast("Resource Live"); navigate('home');
        }

        function closeVault() { document.getElementById('media-vault').classList.add('hidden'); document.getElementById('vault-frame').src = ""; }
        function logout() { localStorage.clear(); location.reload(); }
        function closeOtp() { document.getElementById('otp-modal').classList.add('hidden'); }
        function toggleAuthMode() { isSignup = !isSignup; document.getElementById('signup-fields').classList.toggle('hidden'); document.getElementById('toggle-auth-btn').innerText = isSignup ? "Log In" : "Sign Up"; }

        // Start Campus Service
        window.onload = () => {
            if (user) {
                const page = history.state?.page || 'home';
                const query = history.state?.query || '';
                renderPage(page, query);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
