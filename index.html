<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass Pro | Secure LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-orange { background: #f97316; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-orange:hover { background: #ea580c; transform: translateY(-2px); }
        .input-field { background: #111; border: 1px solid #222; padding: 14px; border-radius: 12px; width: 100%; outline: none; color: white; }
        .input-field:focus { border-color: #f97316; }
    </style>
</head>
<body>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[2.5rem]">
            <h1 class="text-5xl font-black text-orange-500 text-center mb-8 tracking-tighter">OpenClass</h1>
            
            <div id="signup-fields" class="hidden space-y-4 mb-4">
                <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                <input type="text" id="reg-inst" placeholder="Institute" class="input-field">
                <select id="reg-role" class="input-field">
                    <option value="STUDENT">Student</option>
                    <option value="TEACHER">Teacher</option>
                </select>
            </div>
            
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email Address" class="input-field">
                <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                <button onclick="handleAuth()" id="primary-btn" class="w-full py-5 btn-orange rounded-xl">Login</button>
                <button onclick="toggleMode()" class="w-full text-[10px] text-zinc-600 font-bold tracking-widest mt-4">Switch Sign In / Signup</button>
            </div>
        </div>
    </div>

    <!-- CUSTOM OTP MODAL -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[2.5rem] text-center border-orange-500/20">
            <h3 class="text-2xl font-bold mb-2">Verify OTP</h3>
            <p class="text-zinc-500 text-sm mb-8">Check your email for the verification code.</p>
            <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-3xl font-black mb-8">
            <button onclick="verifyOtp()" class="w-full py-4 btn-orange rounded-xl">Verify & Sign Up</button>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen flex flex-col">
        <nav class="p-4 border-b border-zinc-900 glass flex justify-between items-center sticky top-0 z-50">
            <h2 class="text-xl font-black text-orange-500">OPENCLASS</h2>
            <button onclick="logout()" class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Logout</button>
        </nav>
        <main id="dash-content" class="p-6 max-w-5xl mx-auto"></main>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbyhaf1mKBQQ5bX_lVjLNemQZQC5_Hy7ZF6rx0tE2g78bVwNlgzfguUSC9ruwGGl0LvvSg/exec", // IMPORTANT: REDEPLOY AND GET A NEW URL
            EMAIL_SVC: "service_djr1n0f",
            EMAIL_TMP: "template_tiqnb53",
            EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false, generatedOtp, pendingPayload;

        if(user) renderDashboard();

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Verify Email" : "Login";
        }

        async function secureFetch(data) {
            try {
                // Using text/plain is the magic bullet to bypass complex CORS checks
                const response = await fetch(CONFIG.URL, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (err) {
                console.error("CORS/Connection Error:", err);
                return "Connection Error. Ensure Script is deployed as 'Anyone'.";
            }
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const btn = document.getElementById('primary-btn');

            if(isSignup) {
                btn.innerText = "Sending Code...";
                generatedOtp = Math.floor(100000 + Math.random() * 900000);
                pendingPayload = {
                    action: "signup",
                    payload: { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value, institute: document.getElementById('reg-inst').value }
                };
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: generatedOtp });
                document.getElementById('otp-modal').classList.remove('hidden');
                btn.innerText = "Verify Email";
            } else {
                btn.innerText = "Authorizing...";
                const res = await secureFetch({ action: "login", payload: { email, password: pass }});
                if(res && res.email) {
                    localStorage.setItem('oc_user', JSON.stringify(res));
                    user = res;
                    renderDashboard();
                } else { alert(res || "Login failed"); }
                btn.innerText = "Login";
            }
        }

        async function verifyOtp() {
            if(document.getElementById('otp-input').value == generatedOtp) {
                const res = await secureFetch(pendingPayload);
                if(res === "Success") {
                    alert("Account Verified! Please login.");
                    location.reload();
                } else { alert(res); }
            } else { alert("Wrong OTP code."); }
        }

        function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dash-content').innerHTML = `
                <div class="glass p-10 rounded-[2.5rem] border-orange-500/20">
                    <h2 class="text-4xl font-black mb-2 uppercase tracking-tighter">Welcome, ${user.name}</h2>
                    <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest">${user.role} Account • Verified Access</p>
                </div>
            `;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
