<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass Pro | Secure LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); transition: all 0.3s ease; }
        .btn-orange:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #f97316; }
        .input-field { background: #111; border: 1px solid #222; padding: 1rem; border-radius: 12px; width: 100%; outline: none; transition: border 0.3s; }
        .input-field:focus { border-color: #f97316; }
        .no-select { user-select: none; -webkit-user-select: none; }
        iframe { pointer-events: auto !important; }
    </style>
</head>
<body class="no-select">

    <div id="app">
        <!-- Auth Screen -->
        <div id="auth-container" class="min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[2.5rem]">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black text-orange-500 tracking-tighter">OpenClass</h1>
                    <p id="auth-subtitle" class="text-zinc-500 text-sm mt-2">Sign in to your campus</p>
                </div>

                <div id="auth-form" class="space-y-4">
                    <!-- Fields toggle dynamically -->
                    <div id="signup-fields" class="hidden space-y-4">
                        <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                        <input type="text" id="reg-inst" placeholder="Institute/School" class="input-field">
                        <input type="number" id="reg-age" placeholder="Age" class="input-field">
                        <select id="reg-role" class="input-field">
                            <option value="STUDENT">I am a Student</option>
                            <option value="TEACHER">I am a Teacher</option>
                        </select>
                    </div>
                    <input type="email" id="auth-email" placeholder="Email Address" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-orange rounded-xl font-bold uppercase tracking-widest mt-4">Login</button>
                    <p class="text-center text-sm text-zinc-500 mt-6">
                        <span id="toggle-text">Don't have an account?</span>
                        <button onclick="toggleAuthMode()" class="text-orange-500 font-bold ml-1">Click here</button>
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-container" class="hidden min-h-screen">
            <nav class="p-4 border-b border-white/5 glass flex justify-between items-center sticky top-0 z-50">
                <h2 class="text-xl font-black text-orange-500 tracking-tighter">OPENCLASS</h2>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden md:block">
                        <p id="nav-name" class="text-xs font-bold"></p>
                        <p id="nav-id" class="text-[10px] text-zinc-500 font-mono uppercase"></p>
                    </div>
                    <button onclick="logout()" class="p-2 hover:bg-red-500/10 rounded-full text-zinc-500 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                </div>
            </nav>

            <main id="dashboard-content" class="p-6 max-w-5xl mx-auto space-y-8"></main>
        </div>
    </div>

    <!-- Protected Player -->
    <div id="player-modal" class="hidden fixed inset-0 z-[100] bg-black/98 flex flex-col items-center justify-center">
        <button onclick="closePlayer()" class="absolute top-8 right-8 text-zinc-500 hover:text-white transition-colors">✕ Close</button>
        <div class="w-full max-w-4xl aspect-video glass rounded-3xl overflow-hidden relative border border-white/10">
            <!-- The blocking overlay is now behind the controls or transparent but allowing interaction -->
            <div class="absolute inset-0 z-10 pointer-events-none border-[20px] border-black/20"></div>
            <iframe id="main-player" class="w-full h-full" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
        <p class="mt-4 text-[10px] text-zinc-600 uppercase tracking-[0.3em]">Encrypted Stream • Unauthorized recording is prohibited</p>
    </div>

    <script>
        const CONFIG = {
            SHEET_URL: "https://script.google.com/macros/s/AKfycby0xNAv1sNdo34kpPHkrlAceq8iZDOMXaoy9k_B9_hvTFtjR935CqCylGw1egqP8ppDdA/exec",
            EMAILJS_PUB: "P88qoYcr5CHYVNAPw",
            EMAILJS_SVC: "service_djr1n0f",
            EMAILJS_TMP: "template_tiqnb53"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false;

        if(user) renderDashboard();

        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('auth-subtitle').innerText = isSignup ? "Create your profile" : "Sign in to your campus";
            document.getElementById('primary-btn').innerText = isSignup ? "Verify & Register" : "Login";
            document.getElementById('toggle-text').innerText = isSignup ? "Already have an account?" : "Don't have an account?";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if(isSignup) {
                const name = document.getElementById('reg-name').value;
                const otp = Math.floor(100000 + Math.random() * 900000);
                
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: otp });
                const userOtp = prompt("Enter OTP sent to " + email);
                
                if(userOtp == otp) {
                    const res = await fetch(CONFIG.URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "signup",
                            payload: { email, password: pass, name, institute: document.getElementById('reg-inst').value, age: document.getElementById('reg-age').value, role: document.getElementById('reg-role').value }
                        })
                    });
                    alert("Account Created! Please login.");
                    toggleAuthMode();
                }
            } else {
                const res = await fetch(CONFIG.URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", payload: { email, password: pass } })
                });
                const userData = await res.json();
                if(typeof userData === 'object') {
                    localStorage.setItem('oc_user', JSON.stringify(userData));
                    user = userData;
                    renderDashboard();
                } else {
                    alert(userData);
                }
            }
        }

        function renderDashboard() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('dashboard-container').classList.remove('hidden');
            document.getElementById('nav-name').innerText = user.name;
            document.getElementById('nav-id').innerText = user.teacherId || "Student Account";
            
            const main = document.getElementById('dashboard-content');
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 space-y-6">
                            <div class="glass p-8 rounded-[2rem] space-y-4">
                                <h3 class="text-sm font-bold text-orange-500 uppercase">Publish Content</h3>
                                <input id="c-title" placeholder="Lesson Title" class="input-field">
                                <input id="c-url" placeholder="Video/PDF URL" class="input-field">
                                <button onclick="saveContent()" class="w-full py-4 btn-orange rounded-xl font-bold uppercase">Push Live</button>
                            </div>
                            <div class="space-y-4">
                                <h3 class="text-zinc-500 font-bold uppercase text-xs tracking-widest">Library Management</h3>
                                <div id="content-list" class="grid gap-3"></div>
                            </div>
                        </div>
                        <div class="glass p-8 rounded-[2rem] h-fit">
                            <h3 class="text-orange-500 font-bold uppercase text-xs mb-4">Teacher Profile</h3>
                            <p class="text-2xl font-black">${user.teacherId}</p>
                            <p class="text-zinc-500 text-sm mt-2">Students use this ID to find your lessons.</p>
                        </div>
                    </div>
                `;
                loadContent(user.teacherId);
            } else {
                main.innerHTML = `
                    <div class="max-w-2xl mx-auto space-y-8">
                        <div class="flex gap-2">
                            <input id="search-id" placeholder="Enter Teacher ID (e.g. OC-KUNAL123)" class="input-field">
                            <button onclick="searchContent()" class="btn-orange px-8 rounded-xl font-bold uppercase">Find</button>
                        </div>
                        <div id="content-list" class="grid gap-4"></div>
                    </div>
                `;
            }
        }

        async function saveContent() {
            const title = document.getElementById('c-title').value;
            const url = document.getElementById('c-url').value;
            await fetch(CONFIG.URL, {
                method: 'POST',
                body: JSON.stringify({ action: "save_content", payload: { teacherId: user.teacherId, title, url, type: url.includes('.pdf') ? 'PDF' : 'VIDEO' } })
            });
            alert("Published!");
            loadContent(user.teacherId);
        }

        async function loadContent(id) {
            const res = await fetch(CONFIG.URL + "?teacherId=" + id);
            const data = await res.json();
            const list = document.getElementById('content-list');
            list.innerHTML = data.map(item => `
                <div class="glass p-5 rounded-2xl flex justify-between items-center group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-orange-500 font-bold">
                            ${item.type === 'VIDEO' ? '▶' : '📄'}
                        </div>
                        <div>
                            <p class="font-bold">${item.title}</p>
                            <p class="text-[10px] text-zinc-500 font-bold uppercase">${item.views || 0} Views • ${item.type}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openPlayer('${item.id}', '${item.url}', '${item.type}')" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Access</button>
                        ${user.role === 'TEACHER' ? `<button onclick="deleteContent('${item.id}')" class="p-2 text-zinc-600 hover:text-red-500 transition-colors">🗑️</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function deleteContent(id) {
            if(!confirm("Delete this lesson?")) return;
            await fetch(CONFIG.URL, { method: 'POST', body: JSON.stringify({ action: "delete_content", payload: { id } }) });
            loadContent(user.teacherId);
        }

        async function openPlayer(id, url, type) {
            // Track view
            fetch(CONFIG.URL, { method: 'POST', body: JSON.stringify({ action: "track_view", payload: { id } }) });
            
            if(type === 'VIDEO') {
                let videoId = "";
                if(url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
                else if(url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1];
                
                document.getElementById('main-player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
                document.getElementById('player-modal').classList.remove('hidden');
            } else {
                window.open(url, '_blank');
            }
        }

        function searchContent() {
            const id = document.getElementById('search-id').value.toUpperCase();
            loadContent(id);
        }

        function closePlayer() {
            document.getElementById('player-modal').classList.add('hidden');
            document.getElementById('main-player').src = "";
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
