<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Premium LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); transition: 0.3s ease; }
        .btn-orange:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #f97316; }
        .input-field { background: #111; border: 1px solid #222; padding: 1rem; border-radius: 12px; width: 100%; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #f97316; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        
        /* Loading Animation */
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .skeleton { animation: shimmer 1.5s infinite ease-in-out; background: #111; }
        
        /* Toast Animation */
        #toast-container { fixed top-6 right-6 z-[200] flex flex-col gap-3; }
        .toast { animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="selection:bg-orange-500/30">

    <div id="toast-container" class="fixed top-6 right-6 z-[200]"></div>

    <!-- Custom Modal System -->
    <div id="custom-modal" class="hidden fixed inset-0 z-[150] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-8 rounded-[2.5rem] border border-white/10">
            <h3 id="modal-title" class="text-xl font-bold mb-2">Confirm Action</h3>
            <div id="modal-body" class="mb-6"></div>
            <div class="flex gap-3" id="modal-footer"></div>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[2.5rem] relative text-center">
            <button onclick="closeOtp()" class="absolute top-6 right-6 text-zinc-500 hover:text-white">✕</button>
            <h3 class="text-2xl font-black mb-2">Verify OTP</h3>
            <p id="otp-note" class="text-zinc-500 text-xs mb-8"></p>
            <input type="number" id="otp-input" class="input-field text-center text-4xl font-black mb-8 tracking-tighter" placeholder="000000">
            <button onclick="verifyOtp()" class="w-full py-4 btn-orange rounded-2xl font-bold uppercase tracking-widest">Verify & Finish</button>
        </div>
    </div>

    <!-- App Container -->
    <div id="app">
        <!-- Auth View -->
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[3rem]">
                <div class="text-center mb-10">
                    <h1 class="text-5xl font-black text-orange-500 tracking-tighter italic">OpenClass</h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.4em] mt-2">Professional Hub</p>
                </div>
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="STUDENT">I'm a Student</option>
                        <option value="TEACHER">I'm a Teacher</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email Address" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-orange rounded-2xl font-bold uppercase tracking-widest">Sign In</button>
                    <p class="text-center text-xs text-zinc-500 mt-6">
                        <button onclick="toggleMode()" class="text-orange-500 font-bold">Don't have an account? Sign up</button>
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-5 border-b border-white/5 glass flex justify-between items-center sticky top-0 z-50 px-10">
                <h2 class="text-2xl font-black text-orange-500 tracking-tighter cursor-pointer" onclick="loadHome()">OPENCLASS</h2>
                <div class="flex items-center gap-6">
                    <div class="relative group">
                        <input type="text" id="g-search" onkeyup="handleSearch(event)" placeholder="Search anything..." class="bg-zinc-900/50 border border-white/5 rounded-xl px-6 py-2 text-sm w-80 outline-none focus:border-orange-500 focus:w-96 transition-all">
                        <div id="search-results" class="hidden absolute top-full right-0 mt-4 w-[500px] glass rounded-3xl p-4 max-h-[400px] overflow-y-auto border border-orange-500/20 shadow-2xl"></div>
                    </div>
                    <button onclick="logout()" class="text-zinc-500 hover:text-red-500 transition-colors">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                    </button>
                </div>
            </nav>
            <main id="main-content" class="p-10 max-w-7xl mx-auto w-full"></main>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbwcYobCD7N1oOJQvldU9zsQCBRp247Rl-ZZvflaVczqpcANtLPT58xtzUJdAGzmFxvrjg/exec",
            EMAIL_SVC: "service_djr1n0f",
            EMAIL_TMP: "template_tiqnb53",
            EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false, genOtp, pending;

        // UI Helpers
        function toast(msg, type = "success") {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = `toast glass px-6 py-4 rounded-2xl border-l-4 ${type === 'success' ? 'border-green-500' : 'border-red-500'} flex items-center gap-3 shadow-xl`;
            div.innerHTML = `<span class="text-xl">${type === 'success' ? '✅' : '❌'}</span> <span class="font-bold text-sm">${msg}</span>`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        function showModal(title, bodyHtml, footerHtml) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = bodyHtml;
            document.getElementById('modal-footer').innerHTML = footerHtml;
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        function hideModal() { document.getElementById('custom-modal').classList.add('hidden'); }

        // Logic
        if(user) renderDashboard();

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Verify Email" : "Sign In";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(isSignup) {
                genOtp = Math.floor(100000 + Math.random() * 900000);
                pending = { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value };
                document.getElementById('otp-note').innerText = `OTP sent to ${email}`;
                toast("OTP Sending...", "success");
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: genOtp });
                document.getElementById('otp-modal').classList.remove('hidden');
            } else {
                const res = await api("login", { email, password: pass });
                if(res.email) { 
                    localStorage.setItem('oc_user', JSON.stringify(res)); 
                    user = res; 
                    renderDashboard(); 
                    toast(`Welcome back, ${user.name}`);
                } else { toast(res, "error"); }
            }
        }

        async function verifyOtp() {
            if(document.getElementById('otp-input').value == genOtp) {
                const res = await api("signup", pending);
                toast("Registration Successful!");
                location.reload();
            } else { toast("Invalid OTP Code", "error"); }
        }

        function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            loadHome();
        }

        async function loadHome() {
            const main = document.getElementById('main-content');
            main.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${Array(6).fill('<div class="skeleton h-48 rounded-3xl"></div>').join('')}</div>`;
            
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid lg:grid-cols-3 gap-10">
                        <div class="glass p-8 rounded-[2.5rem] h-fit border border-orange-500/10">
                            <h3 class="text-orange-500 font-black text-xs mb-6 uppercase tracking-widest">Publish Resource</h3>
                            <div class="space-y-4">
                                <input id="up-title" placeholder="Topic Title" class="input-field">
                                <input id="up-url" placeholder="Resource URL (Video/Doc)" class="input-field">
                                <select id="up-type" class="input-field">
                                    <option value="VIDEO">Video</option>
                                    <option value="FILE">Document</option>
                                </select>
                                <button onclick="uploadContent()" class="w-full py-4 btn-orange rounded-2xl text-xs font-black uppercase tracking-widest">Go Live</button>
                            </div>
                        </div>
                        <div id="feed" class="lg:col-span-2 space-y-6"></div>
                    </div>`;
                const data = await api("search", {}, user.teacherId);
                renderFeed(data, true);
            } else {
                const data = await api("get_subscribed_feed", { email: user.email });
                main.innerHTML = `<div id="feed" class="max-w-3xl mx-auto space-y-6"></div>`;
                renderFeed(data, false);
            }
        }

        function renderFeed(data, isTeacher) {
            const feed = document.getElementById('feed');
            if(!data || data.length === 0) { 
                feed.innerHTML = `<div class="text-center py-20 text-zinc-600"><p class="text-4xl mb-4">📭</p><p>${isTeacher ? "Your gallery is empty." : "No updates from your subscribed teachers."}</p></div>`; 
                return; 
            }
            feed.innerHTML = data.map(item => `
                <div class="glass p-8 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-6 group hover:border-orange-500/30 transition-all border border-transparent">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 rounded-2xl bg-zinc-900 flex items-center justify-center text-2xl">${item.type === 'VIDEO' ? '🎬' : '📄'}</div>
                        <div>
                            <span class="text-[10px] text-orange-500 font-black uppercase tracking-widest">${item.type}</span>
                            <h4 class="text-xl font-bold">${item.title}</h4>
                            <p class="text-xs text-zinc-500 font-medium">By ${item.tName} • <span class="text-zinc-300">${item.views}</span> Views</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="openLink('${item.id}','${item.url}','${item.type}')" class="bg-white text-black px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:scale-105 transition-all">Open</button>
                        ${isTeacher ? `
                            <button onclick="prepEdit('${item.id}','${item.title}','${item.url}')" class="bg-zinc-800 p-3 rounded-xl hover:bg-orange-500/20">✎</button>
                            <button onclick="prepDelete('${item.id}')" class="bg-zinc-800 p-3 rounded-xl hover:bg-red-500/20">🗑</button>
                        ` : ''}
                    </div>
                </div>`).join('');
        }

        async function uploadContent() {
            const payload = { teacherId: user.teacherId, teacherName: user.name, title: document.getElementById('up-title').value, url: document.getElementById('up-url').value, type: document.getElementById('up-type').value };
            await api("upload", payload);
            toast("Resource Published Successfully!");
            loadHome();
        }

        async function prepDelete(id) {
            showModal("Confirm Deletion", "<p class='text-zinc-500'>Are you sure you want to remove this resource permanently?</p>", `
                <button onclick="hideModal()" class="flex-1 py-3 bg-zinc-900 rounded-xl font-bold">Cancel</button>
                <button onclick="confirmDelete('${id}')" class="flex-1 py-3 bg-red-600 rounded-xl font-bold">Delete</button>
            `);
        }

        async function confirmDelete(id) {
            hideModal();
            await api("delete", { id });
            toast("Resource Deleted");
            loadHome();
        }

        function prepEdit(id, title, url) {
            showModal("Edit Resource", `
                <div class="space-y-4">
                    <input id="edit-title" value="${title}" class="input-field">
                    <input id="edit-url" value="${url}" class="input-field">
                </div>`, `
                <button onclick="hideModal()" class="flex-1 py-3 bg-zinc-900 rounded-xl font-bold">Cancel</button>
                <button onclick="confirmEdit('${id}')" class="flex-1 py-3 btn-orange rounded-xl font-bold">Save Changes</button>
            `);
        }

        async function confirmEdit(id) {
            const title = document.getElementById('edit-title').value;
            const url = document.getElementById('edit-url').value;
            hideModal();
            await api("edit", { id, title, url });
            toast("Changes Saved");
            loadHome();
        }

        async function handleSearch(e) {
            const q = e.target.value;
            const resultsDiv = document.getElementById('search-results');
            if(q.length < 2) { resultsDiv.classList.add('hidden'); return; }
            
            resultsDiv.classList.remove('hidden');
            resultsDiv.innerHTML = `<div class="p-4 text-center text-xs text-zinc-600">Searching global network...</div>`;
            
            const data = await api("search", {}, q);
            if(data.length === 0) {
                resultsDiv.innerHTML = `<div class="p-8 text-center text-xs text-zinc-600">No results for "${q}"</div>`;
            } else {
                resultsDiv.innerHTML = data.map(item => `
                    <div class="p-4 hover:bg-orange-500/5 rounded-2xl flex justify-between items-center group transition-all">
                        <div>
                            <p class="font-bold text-sm">${item.title}</p>
                            <p class="text-[10px] text-zinc-500 uppercase font-black">${item.tName} • ${item.tId}</p>
                        </div>
                        <button onclick="handleSubscribe('${item.tId}')" class="text-[10px] font-black text-orange-500 uppercase tracking-widest px-4 py-2 bg-orange-500/10 rounded-lg">Subscribe</button>
                    </div>`).join('');
            }
        }

        async function handleSubscribe(tId) {
            await api("subscribe", { studentEmail: user.email, teacherId: tId });
            toast(`Subscribed to ${tId}`);
            document.getElementById('search-results').classList.add('hidden');
            loadHome();
        }

        async function api(action, payload = {}, query = "") {
            const res = await fetch(`${CONFIG.URL}?action=${action}&query=${query}&payload=${encodeURIComponent(JSON.stringify(payload))}`);
            return await res.json();
        }

        function logout() { localStorage.clear(); location.reload(); }
        async function openLink(id, url, type) {
            await api("track_view", { id });
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
