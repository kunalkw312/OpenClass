<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Premium Pro LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#004a80',
                        brandOrange: '#f7941d',
                        offWhite: '#fdfbf7',
                    }
                }
            }
        }
    </script>
    <style>
        :root { --text-main: #fdfbf7; --bg-main: #050505; --glass-bg: rgba(15, 15, 15, 0.8); }
        .light { --text-main: #002e50; --bg-main: #fdfbf7; --glass-bg: rgba(255, 255, 255, 0.7); }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: all 0.3s ease; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(128,128,128,0.1); }
        
        .btn-brand { 
            background: linear-gradient(135deg, #004a80 0%, #f7941d 100%);
            background-size: 200% auto;
            transition: 0.4s;
        }
        .btn-brand:hover { background-position: right center; transform: translateY(-2px); }

        .spinner { 
            width: 50px; height: 50px; 
            border: 5px solid rgba(0, 74, 128, 0.2); 
            border-top: 5px solid #f7941d; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .input-field { 
            background: rgba(128,128,128,0.1); 
            border: 1px solid rgba(128,128,128,0.2); 
            color: var(--text-main);
        }
        .input-field::placeholder { color: rgba(128,128,128,0.5); }
    </style>
</head>
<body>

    <div id="toast-box" class="fixed top-4 right-4 z-[600] flex flex-col gap-3"></div>

    <div id="global-loader" class="hidden fixed inset-0 z-[550] bg-black/80 flex flex-col items-center justify-center">
        <div class="spinner"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-brandOrange">Syncing OpenClass...</p>
    </div>

    <!-- Media Vault -->
    <div id="media-vault" class="hidden fixed inset-0 z-[500] bg-black flex flex-col">
        <nav class="p-4 glass border-b border-white/5 flex justify-between items-center px-6">
            <div class="flex items-center gap-3">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-8 rounded" alt="Logo">
                <h3 id="vault-title" class="font-black text-xs uppercase italic"><span class="text-white">Open</span><span class="text-brandOrange">Class</span></h3>
            </div>
            <button onclick="closeVault()" class="bg-brandBlue text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Close</button>
        </nav>
        <div class="flex-grow flex items-center justify-center p-2 bg-zinc-900">
            <iframe id="vault-frame" class="w-full aspect-video md:h-full max-w-6xl rounded-xl shadow-2xl bg-black" allowfullscreen></iframe>
        </div>
    </div>

    <div id="app">
        <!-- Auth View -->
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-8 md:p-10 rounded-[2.5rem] shadow-2xl text-center">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-xl shadow-lg" alt="Logo">
                <h1 class="text-4xl font-black mb-8 italic">
                    <span class="dark:text-white light:text-brandBlue">Open</span><span class="text-brandOrange">Class</span>
                </h1>
                
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field w-full p-4 rounded-xl outline-none">
                    <select id="reg-role" class="input-field w-full p-4 rounded-xl outline-none">
                        <option value="STUDENT">Student</option>
                        <option value="TEACHER">Teacher</option>
                    </select>
                </div>
                
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Campus Email" class="input-field w-full p-4 rounded-xl outline-none">
                    <div class="relative">
                        <input type="password" id="auth-pass" placeholder="Password" class="input-field w-full p-4 rounded-xl outline-none">
                        <button onclick="togglePassword('auth-pass')" class="absolute right-4 top-4 text-zinc-500 text-[10px] font-bold uppercase">View</button>
                    </div>
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-brand text-white rounded-2xl font-black uppercase tracking-widest shadow-lg">Sign In</button>
                    <button onclick="toggleAuthMode()" id="toggle-auth-btn" class="w-full text-[10px] text-zinc-500 font-bold uppercase mt-4 hover:text-brandOrange transition-colors">Create Campus Account</button>
                </div>
                <button onclick="toggleDarkMode()" class="mt-8 text-[9px] font-bold uppercase opacity-50">🌓 Toggle Mode</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-4 glass border-b border-white/5 sticky top-0 z-50 flex flex-col md:flex-row gap-4 justify-between px-6 md:px-10 items-center">
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-10 rounded cursor-pointer" onclick="loadHome()">
                    <h2 class="text-xl font-black italic cursor-pointer" onclick="loadHome()">
                        <span class="dark:text-white light:text-brandBlue">Open</span><span class="text-brandOrange">Class</span>
                    </h2>
                </div>
                
                <div class="relative w-full md:w-auto flex items-center">
                    <input type="text" id="g-search" onkeyup="if(event.key==='Enter') executeSearch()" placeholder="Search Teacher or Media..." class="input-field rounded-l-2xl px-6 py-2 text-sm w-full md:w-80 outline-none">
                    <button onclick="executeSearch()" class="bg-brandOrange p-2.5 rounded-r-2xl text-white">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="8" cy="8" r="5"/><path d="M12 12l4 4"/></svg>
                    </button>
                </div>

                <div class="flex items-center gap-6">
                    <button onclick="toggleDarkMode()" class="text-sm">🌓</button>
                    <button onclick="logout()" class="text-[10px] font-black text-red-500 uppercase">Logout</button>
                </div>
            </nav>
            <main id="main-content" class="p-6 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[600] bg-black/95 flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass p-8 rounded-[3rem] text-center border border-brandOrange/20">
            <h3 class="text-2xl font-black mb-2 text-brandOrange italic">Verify Identity</h3>
            <p id="otp-note" class="text-zinc-500 text-[9px] mb-8 uppercase font-bold"></p>
            <input type="number" id="otp-input" class="input-field text-center text-4xl font-black mb-8 w-full p-4 rounded-xl" placeholder="000000">
            <div class="flex gap-2">
                <button onclick="closeOtp()" class="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold uppercase text-xs">Cancel</button>
                <button onclick="verifyOtp()" class="flex-2 px-8 py-4 btn-brand rounded-2xl font-bold uppercase text-xs text-white">Verify</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbxII3g79Ri9EOX4zLr3rDgOlTprDwHsr5SEMysBqhh7owEKq9JcI4cVzvozIVdBJT6D8g/exec",
            EMAIL_SVC: "service_djr1n0f", EMAIL_TMP: "template_tiqnb53", EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };
        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user')), isSignup = false, genOtp, pending;

        // UI Handlers
        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Verify Email" : "Sign In";
            document.getElementById('toggle-auth-btn').innerText = isSignup ? "Already have an account? Log In" : "Create Campus Account";
        }

        function togglePassword(id) {
            const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password';
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            document.documentElement.classList.toggle('light');
        }

        function toast(msg, type="success") {
            const b = document.getElementById('toast-box');
            const d = document.createElement('div');
            d.className = `glass px-6 py-4 rounded-xl border-l-4 ${type==='success'?'border-brandOrange':'border-red-500'} text-[10px] font-black uppercase shadow-2xl`;
            d.innerText = msg; b.appendChild(d);
            setTimeout(() => d.remove(), 4000);
        }

        function toggleLoader(s) { document.getElementById('global-loader').classList[s?'remove':'add']('hidden'); }
        function closeOtp() { document.getElementById('otp-modal').classList.add('hidden'); }
        function closeVault() { document.getElementById('media-vault').classList.add('hidden'); document.getElementById('vault-frame').src=""; }

        // Auth Logic
        async function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return toast("Empty fields", "error");
            
            if(isSignup) {
                toggleLoader(true);
                genOtp = Math.floor(100000 + Math.random() * 900000);
                pending = { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value };
                document.getElementById('otp-note').innerText = `OTP sent to ${email}`;
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: genOtp });
                document.getElementById('otp-modal').classList.remove('hidden');
                toggleLoader(false);
            } else {
                toggleLoader(true);
                const res = await api("login", { email, password: pass });
                if(res.email) { localStorage.setItem('oc_user', JSON.stringify(res)); user = res; renderDashboard(); }
                else toast(res, "error");
                toggleLoader(false);
            }
        }

        async function verifyOtp() {
            if(document.getElementById('otp-input').value == genOtp) {
                toggleLoader(true);
                const res = await api("signup", pending);
                if(res === "Success") {
                    // Logic for direct login after signup
                    const loginRes = await api("login", { email: pending.email, password: pending.password });
                    localStorage.setItem('oc_user', JSON.stringify(loginRes));
                    user = loginRes;
                    renderDashboard();
                    toast("Verification Successful! Welcome.");
                }
                toggleLoader(false);
                closeOtp();
            } else toast("Wrong Code", "error");
        }

        // Search & Feed
        async function executeSearch() {
            const q = document.getElementById('g-search').value;
            if(!q) return;
            toggleLoader(true);
            const results = await api("search", { email: user.email }, q);
            renderSearchResults(results);
            toggleLoader(false);
        }

        function renderSearchResults(data) {
            const main = document.getElementById('main-content');
            if(!data.length) { main.innerHTML = `<p class="text-center py-20">No results found.</p>`; return; }
            
            // Best match (Top profile)
            const top = data[0];
            main.innerHTML = `
                <div class="space-y-8">
                    <div class="glass p-8 rounded-[3rem] border border-brandOrange/20 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="flex items-center gap-6">
                            <div class="w-16 h-16 bg-brandBlue rounded-full flex items-center justify-center text-white text-2xl font-black">${top.name[0]}</div>
                            <div>
                                <h2 class="text-2xl font-black italic">${top.name}</h2>
                                <p class="text-sm opacity-60 uppercase font-bold tracking-widest">${top.id} • ${top.postCount} Media</p>
                            </div>
                        </div>
                        <button onclick="handleSubToggle(this, '${top.id}', ${top.isSubscribed})" class="px-8 py-3 ${top.isSubscribed ? 'bg-zinc-700 text-white' : 'btn-brand text-white'} rounded-2xl font-bold uppercase text-xs">
                            ${top.isSubscribed ? 'Unsubscribe' : 'Subscribe'}
                        </button>
                    </div>
                    <div class="grid gap-4">
                        <h3 class="text-xs font-black uppercase opacity-40 ml-4 tracking-widest">Related Media</h3>
                        ${data.flatMap(t => t.posts).map(p => `
                            <div class="glass p-5 rounded-2xl flex justify-between items-center group hover:border-brandOrange/30 transition-all">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 bg-brandBlue/10 rounded-xl flex items-center justify-center">${p.type==='VIDEO'?'🎬':'📄'}</div>
                                    <div>
                                        <p class="font-bold text-sm">${p.title}</p>
                                        <p class="text-[10px] opacity-50 uppercase font-bold">Uploaded by ${top.name}</p>
                                    </div>
                                </div>
                                <button onclick="openResource('${p.id}','${p.url}','${p.type}','${p.title}')" class="bg-brandOrange/10 text-brandOrange px-6 py-2 rounded-xl text-[10px] font-bold uppercase">View</button>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        async function handleSubToggle(btn, tId, isSubbed) {
            btn.disabled = true;
            const action = isSubbed ? "unsubscribe" : "subscribe";
            await api(action, { studentEmail: user.email, teacherId: tId });
            toast(isSubbed ? "Unsubscribed" : "Subscribed");
            executeSearch(); // Refresh search view
            if(user.role === 'STUDENT') loadHome();
        }

        async function api(a, p={}, q="") {
            const r = await fetch(`${CONFIG.URL}?action=${a}&query=${q}&payload=${encodeURIComponent(JSON.stringify(p))}`);
            return await r.json();
        }

        function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            loadHome();
        }

        async function loadHome() {
            const main = document.getElementById('main-content');
            toggleLoader(true);
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid lg:grid-cols-3 gap-10">
                        <div class="glass p-8 rounded-[3rem] h-fit lg:sticky lg:top-28">
                            <h3 class="text-brandOrange font-black text-[10px] uppercase mb-6 tracking-widest italic">New Upload</h3>
                            <input id="up-title" placeholder="Title" class="input-field mb-3 w-full p-3 rounded-xl outline-none">
                            <input id="up-url" placeholder="URL" class="input-field mb-3 w-full p-3 rounded-xl outline-none">
                            <select id="up-type" class="input-field mb-6 w-full p-3 rounded-xl outline-none">
                                <option value="VIDEO">Video</option><option value="FILE">Document</option>
                            </select>
                            <button onclick="publish()" class="w-full py-4 btn-brand text-white rounded-xl font-bold text-xs uppercase tracking-widest">Publish</button>
                        </div>
                        <div id="feed" class="lg:col-span-2 space-y-4"></div>
                    </div>`;
                const data = await api("search", { email: user.email }, user.teacherId);
                renderFeed(data[0]?.posts || [], true);
            } else {
                main.innerHTML = `<div id="feed" class="max-w-2xl mx-auto space-y-4"></div>`;
                const data = await api("get_subscribed_feed", { email: user.email });
                renderFeed(data, false);
            }
            toggleLoader(false);
        }

        function renderFeed(data, isT) {
            const f = document.getElementById('feed');
            if(!data.length) { f.innerHTML = `<p class="text-center py-20 opacity-40 uppercase text-[10px] font-black tracking-widest">No activity found</p>`; return; }
            f.innerHTML = data.map(i => `
                <div class="glass p-6 rounded-[2.5rem] flex justify-between items-center group hover:border-brandOrange/20 transition-all">
                    <div class="flex items-center gap-6">
                        <div class="w-12 h-12 bg-brandBlue/10 rounded-2xl flex items-center justify-center">${i.type==='VIDEO'?'🎬':'📄'}</div>
                        <div>
                            <p class="text-[9px] text-brandOrange font-black uppercase tracking-widest">${i.type}</p>
                            <h4 class="font-bold text-lg italic tracking-tight">${i.title}</h4>
                        </div>
                    </div>
                    <button onclick="openResource('${i.id}','${i.url}','${i.type}','${i.title}')" class="bg-brandOrange text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase">Open</button>
                </div>`).join('');
        }

        function openResource(id, url, type, title) {
            document.getElementById('vault-title').innerText = title.toUpperCase();
            let src = url;
            if(type === 'VIDEO') {
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                src = `https://www.youtube.com/embed/${vid}?autoplay=1&modestbranding=1&rel=0`;
            } else if(url.includes('drive.google.com')) src = url.replace('/view', '/preview');
            document.getElementById('vault-frame').src = src;
            document.getElementById('media-vault').classList.remove('hidden');
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
