<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Professional Secure LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#004a80',
                        brandOrange: '#f7941d',
                        offWhite: '#fdfbf7',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass { backdrop-filter: blur(20px); transition: background 0.3s, border 0.3s; }
        
        /* Dark Mode Glass */
        .dark .glass { background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .dark .input-field { background: #111; color: white; border: 1px solid #222; }
        
        /* Light Mode Glass */
        .light .glass { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0, 74, 128, 0.1); }
        .light .input-field { background: #fff; color: #002e50; border: 1px solid #d1d5db; }
        .light body { background: #fdfbf7; color: #002e50; }

        .btn-brand { 
            background: linear-gradient(135deg, #004a80 0%, #f7941d 100%);
            transition: 0.4s;
            background-size: 200% auto;
            color: white !important;
        }
        .btn-brand:hover { background-position: right center; transform: translateY(-2px); }

        .spinner { 
            width: 50px; height: 50px; 
            border: 5px solid rgba(0, 74, 128, 0.1); 
            border-top: 5px solid #f7941d; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="selection:bg-brandOrange/30">

    <div id="toast-box" class="fixed top-4 right-4 left-4 md:left-auto z-[600] flex flex-col gap-3"></div>

    <!-- Global Loader -->
    <div id="global-loader" class="hidden fixed inset-0 z-[550] bg-black/80 flex flex-col items-center justify-center">
        <div class="spinner"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-brandOrange">Synchronizing...</p>
    </div>

    <!-- Media Vault -->
    <div id="media-vault" class="hidden fixed inset-0 z-[450] bg-black flex flex-col">
        <nav class="p-4 glass border-b flex justify-between items-center px-6 md:px-10">
            <h3 id="vault-title" class="font-black text-brandOrange text-xs md:text-sm italic uppercase truncate mr-4">Secure Preview</h3>
            <button onclick="closeVault()" class="bg-brandBlue text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Close</button>
        </nav>
        <div class="flex-grow flex items-center justify-center p-2 bg-zinc-900">
            <iframe id="vault-frame" class="w-full aspect-video md:h-full max-w-6xl rounded-2xl shadow-2xl bg-black" allowfullscreen></iframe>
        </div>
    </div>

    <div id="app">
        <!-- Authentication -->
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-brandBlue/10 via-transparent to-transparent">
            <div class="w-full max-w-md glass p-8 md:p-10 rounded-[3rem] shadow-2xl text-center">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-xl shadow-lg" alt="Logo">
                <h1 class="text-4xl font-black mb-8 italic">
                    <span class="dark:text-offWhite text-brandBlue">Open</span><span class="text-brandOrange">Class</span>
                </h1>
                
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field w-full p-4 rounded-xl outline-none">
                    <select id="reg-role" class="input-field w-full p-4 rounded-xl outline-none">
                        <option value="STUDENT">Student</option>
                        <option value="TEACHER">Teacher</option>
                    </select>
                </div>
                
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Campus Email" class="input-field w-full p-4 rounded-xl outline-none">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field w-full p-4 rounded-xl outline-none">
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-brand rounded-2xl font-black uppercase tracking-widest">Sign In</button>
                    <button onclick="toggleMode()" id="toggle-auth-btn" class="w-full text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-4 hover:text-brandOrange transition-colors underline decoration-brandOrange/30">Create Campus Account</button>
                </div>
                <button onclick="toggleDarkMode()" class="mt-8 text-[9px] font-bold uppercase p-2 opacity-50">Toggle Theme 🌓</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-4 md:p-5 glass border-b sticky top-0 z-50 flex flex-col md:flex-row gap-4 justify-between px-6 md:px-10 items-center">
                <div class="flex items-center gap-3">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-10 rounded cursor-pointer" onclick="loadHome()" alt="Logo">
                    <h2 class="text-xl font-black italic cursor-pointer" onclick="loadHome()">
                        <span class="dark:text-offWhite text-brandBlue">Open</span><span class="text-brandOrange">Class</span>
                    </h2>
                </div>
                
                <div class="relative w-full md:w-96 flex items-center">
                    <span class="absolute left-4 opacity-40">🔍</span>
                    <input type="text" id="g-search" onkeyup="if(event.key==='Enter') triggerGlobalSearch()" placeholder="Search Teacher or Media..." class="input-field w-full pl-12 pr-4 py-2 rounded-2xl outline-none transition-all focus:border-brandOrange">
                </div>

                <div class="flex items-center gap-6">
                    <button onclick="toggleDarkMode()" class="text-xl">🌓</button>
                    <button onclick="logout()" class="text-[10px] font-black text-red-500 uppercase">Logout</button>
                </div>
            </nav>
            <main id="main-content" class="p-4 md:p-10 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[550] bg-black/90 flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass p-8 rounded-[3rem] text-center border-brandOrange/20">
            <h3 class="text-2xl font-black mb-2 text-brandOrange italic">Verification</h3>
            <p id="otp-note" class="text-zinc-500 text-[9px] mb-8 uppercase font-bold"></p>
            <input type="number" id="otp-input" class="input-field text-center text-4xl font-black mb-8 w-full rounded-2xl" placeholder="000000">
            <div class="flex gap-2">
                <button onclick="closeOtp()" class="flex-1 py-4 bg-zinc-800 text-white rounded-2xl font-bold uppercase text-xs">Cancel</button>
                <button onclick="verifyOtp()" class="flex-2 px-8 py-4 btn-brand rounded-2xl font-bold uppercase text-xs">Verify</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbxII3g79Ri9EOX4zLr3rDgOlTprDwHsr5SEMysBqhh7owEKq9JcI4cVzvozIVdBJT6D8g/exec",
            EMAIL_SVC: "service_djr1n0f",
            EMAIL_TMP: "template_tiqnb53",
            EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false, genOtp, pending;

        function toast(msg, type="success") {
            const b = document.getElementById('toast-box');
            const d = document.createElement('div');
            d.className = `glass px-6 py-4 rounded-xl border-l-4 ${type==='success'?'border-brandOrange':'border-red-500'} text-[10px] font-black uppercase shadow-2xl animate-pulse`;
            d.innerText = msg; b.appendChild(d);
            setTimeout(() => d.remove(), 4000);
        }

        function toggleLoader(s) { document.getElementById('global-loader').classList[s?'remove':'add']('hidden'); }
        function closeOtp() { document.getElementById('otp-modal').classList.add('hidden'); genOtp = null; }
        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            html.classList.toggle('light');
            localStorage.setItem('oc_theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        // Init Theme
        if (localStorage.getItem('oc_theme') === 'light') {
            document.documentElement.classList.replace('dark', 'light');
        }

        if(user) renderDashboard();

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Verify Email" : "Sign In";
            document.getElementById('toggle-auth-btn').innerText = isSignup ? "Login with Campus Account" : "Create Campus Account";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return toast("Empty credentials", "error");
            
            if(isSignup) {
                toggleLoader(true);
                genOtp = Math.floor(100000 + Math.random() * 900000);
                pending = { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value };
                document.getElementById('otp-note').innerText = `Sent to ${email}`;
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: genOtp });
                document.getElementById('otp-modal').classList.remove('hidden');
                toggleLoader(false);
            } else {
                toggleLoader(true);
                const res = await api("login", { email, password: pass });
                if(res.email) { loginUser(res); }
                else toast(res, "error");
                toggleLoader(false);
            }
        }

        function loginUser(data) {
            localStorage.setItem('oc_user', JSON.stringify(data));
            user = data;
            renderDashboard();
            toast(`Authenticated: ${user.name}`);
        }

        async function verifyOtp() {
            if(document.getElementById('otp-input').value == genOtp) {
                toggleLoader(true);
                const res = await api("signup", pending);
                if(res === "Success") {
                    // Direct login after signup
                    const loginRes = await api("login", { email: pending.email, password: pending.password });
                    loginUser(loginRes);
                    closeOtp();
                } else toast(res, "error");
                toggleLoader(false);
            } else toast("OTP Mismatch", "error");
        }

        function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            loadHome();
        }

        async function loadHome() {
            const main = document.getElementById('main-content');
            toggleLoader(true);
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid lg:grid-cols-3 gap-10">
                        <div class="glass p-8 rounded-[3rem] h-fit lg:sticky lg:top-28">
                            <h3 class="text-brandOrange font-black text-[10px] uppercase mb-6 tracking-widest italic">New Resource</h3>
                            <input id="up-title" placeholder="Topic Title" class="input-field mb-3 w-full p-3 rounded-xl">
                            <input id="up-url" placeholder="Resource URL" class="input-field mb-3 w-full p-3 rounded-xl">
                            <select id="up-type" class="input-field mb-6 w-full p-3 rounded-xl">
                                <option value="VIDEO">Video Lesson</option>
                                <option value="FILE">Static File</option>
                            </select>
                            <button onclick="publish()" class="w-full py-4 btn-brand text-white rounded-xl font-bold text-xs uppercase shadow-lg">Publish</button>
                        </div>
                        <div id="feed" class="lg:col-span-2 space-y-6"></div>
                    </div>`;
                const data = await api("search", { email: user.email }, user.teacherId);
                renderFeed(data[0]?.posts || [], true);
            } else {
                main.innerHTML = `<div id="feed" class="max-w-3xl mx-auto space-y-6"></div>`;
                const data = await api("get_subscribed_feed", { email: user.email });
                renderFeed(data, false);
            }
            toggleLoader(false);
        }

        async function triggerGlobalSearch() {
            const q = document.getElementById('g-search').value.trim();
            if(!q) return;
            toggleLoader(true);
            const main = document.getElementById('main-content');
            const results = await api("search", { email: user.email }, q);
            
            main.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-3xl font-black italic">Search Results: <span class="text-brandOrange">"${q}"</span></h2>
                        <button onclick="loadHome()" class="text-xs uppercase font-bold opacity-50 underline">Back Home</button>
                    </div>
                    <div id="search-feed" class="space-y-12"></div>
                </div>`;
            
            const feed = document.getElementById('search-feed');
            if(!results.length) { feed.innerHTML = `<p class="text-center py-20 opacity-40">No campus records found.</p>`; }
            else {
                results.forEach((t, index) => {
                    const section = document.createElement('div');
                    section.className = `glass p-8 rounded-[2.5rem] border-l-8 ${index === 0 ? 'border-brandOrange' : 'border-brandBlue'}`;
                    section.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h3 class="text-2xl font-black italic">${t.name} ${index === 0 ? '<span class="text-[10px] bg-brandOrange/20 text-brandOrange px-3 py-1 rounded-full not-italic ml-2">Best Match</span>' : ''}</h3>
                                <p class="text-[10px] font-bold uppercase opacity-60">${t.institute} • ${t.id}</p>
                            </div>
                            <button onclick="toggleSubscription(this, '${t.id}', ${t.isSubscribed})" class="px-6 py-2 ${t.isSubscribed ? 'bg-zinc-800' : 'btn-brand'} rounded-xl text-[10px] font-bold uppercase">
                                ${t.isSubscribed ? 'Unsubscribe' : 'Subscribe'}
                            </button>
                        </div>
                        <div class="space-y-4">
                            ${t.posts.map(p => `
                                <div class="flex justify-between items-center bg-zinc-900/10 p-4 rounded-2xl border border-white/5">
                                    <p class="font-bold text-sm">${p.title}</p>
                                    <button onclick="openResource('${p.id}','${p.url}','${p.type}','${p.title}')" class="text-[10px] font-black uppercase text-brandOrange">Access Resource</button>
                                </div>
                            `).join('')}
                        </div>`;
                    feed.appendChild(section);
                });
            }
            toggleLoader(false);
        }

        async function toggleSubscription(btn, tId, isSubbed) {
            btn.disabled = true;
            const action = isSubbed ? "unsubscribe" : "subscribe";
            await api(action, { studentEmail: user.email, teacherId: tId });
            toast(`${isSubbed ? 'Unsubscribed' : 'Subscribed'}`);
            triggerGlobalSearch(); // Refresh search view
        }

        function renderFeed(data, isT) {
            const f = document.getElementById('feed');
            if(!data.length) { f.innerHTML = `<p class="text-center py-20 opacity-30 text-[10px] uppercase font-black tracking-widest">Feed is empty</p>`; return; }
            f.innerHTML = data.map(i => `
                <div class="glass p-8 rounded-[2.5rem] flex flex-col sm:flex-row justify-between items-center gap-6 border border-transparent hover:border-brandOrange/20 transition-all">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 bg-brandBlue/10 rounded-2xl flex items-center justify-center text-2xl">${i.type==='VIDEO'?'🎬':'📄'}</div>
                        <div>
                            <p class="text-[9px] text-brandOrange font-black uppercase">${i.type}</p>
                            <h4 class="font-bold text-xl italic">${i.title}</h4>
                            <p class="text-[9px] opacity-60 font-bold uppercase">${i.tName || 'Campus Hub'}</p>
                        </div>
                    </div>
                    <button onclick="openResource('${i.id}','${i.url}','${i.type}','${i.title}')" class="bg-brandBlue text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg">Access</button>
                </div>`).join('');
        }

        async function publish() {
            const t = document.getElementById('up-title').value.trim();
            const u = document.getElementById('up-url').value.trim();
            if(!t || !u) return toast("Empty resource fields", "error");
            toggleLoader(true);
            await api("upload", { teacherId: user.teacherId, teacherName: user.name, title: t, url: u, type: document.getElementById('up-type').value });
            toast("Campus Resource Live!"); loadHome();
        }

        function openResource(id, url, type, title) {
            document.getElementById('vault-title').innerText = title.toUpperCase();
            let src = url;
            if(type === 'VIDEO') {
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                src = `https://www.youtube.com/embed/${vid}?autoplay=1&modestbranding=1&rel=0`;
            } else if(url.includes('drive.google.com')) src = url.replace('/view', '/preview');
            document.getElementById('vault-frame').src = src;
            document.getElementById('media-vault').classList.remove('hidden');
        }

        async function api(a, p={}, q="") {
            try {
                const r = await fetch(`${CONFIG.URL}?action=${a}&query=${q}&payload=${encodeURIComponent(JSON.stringify(p))}`);
                return await r.json();
            } catch(e) { return "Network Latency Error"; }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function closeVault() { document.getElementById('media-vault').classList.add('hidden'); document.getElementById('vault-frame').src=""; }
    </script>
</body>
</html>
