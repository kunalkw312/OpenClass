<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Secure Pro LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0a4d8c;
            --brand-cyan: #00a8e8;
            --brand-orange: #f29221;
            --brand-yellow: #ffb400;
        }
        body { background: #020b14; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        /* Brand Gradients */
        .bg-brand-gradient { background: linear-gradient(135deg, var(--brand-orange) 0%, var(--brand-yellow) 100%); }
        .border-brand-blue { border-color: rgba(0, 168, 232, 0.2); }
        
        /* Logo mimic style */
        .logo-star { color: var(--brand-yellow); text-shadow: 0 0 10px rgba(255, 180, 0, 0.5); }
        
        .glass { 
            background: rgba(10, 77, 140, 0.15); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(0, 168, 232, 0.15); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .btn-brand { 
            background: linear-gradient(135deg, var(--brand-orange) 0%, #d47a12 100%); 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(242, 146, 33, 0.3);
        }
        .btn-brand:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(242, 146, 33, 0.5); }
        
        .input-field { 
            background: rgba(2, 11, 20, 0.8); 
            border: 1px solid rgba(0, 168, 232, 0.3); 
            padding: 1rem; 
            border-radius: 12px; 
            width: 100%; 
            outline: none; 
            color: white; 
            transition: 0.3s;
        }
        .input-field:focus { border-color: var(--brand-yellow); box-shadow: 0 0 0 2px rgba(255, 180, 0, 0.2); }
        
        #global-loader { fixed inset-0 z-[300] bg-[#020b14]/95 flex flex-col items-center justify-center transition-all duration-500; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(0, 168, 232, 0.1); border-top: 4px solid var(--brand-orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020b14; }
        ::-webkit-scrollbar-thumb { background: var(--brand-blue); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="toast-box" class="fixed top-4 right-4 left-4 md:left-auto z-[450] flex flex-col gap-3"></div>

    <div id="global-loader" class="hidden fixed inset-0 z-[300]">
        <div class="spinner"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-[0.2em] text-cyan-400">Syncing Campus Hub...</p>
    </div>

    <!-- Media Vault -->
    <div id="media-vault" class="hidden fixed inset-0 z-[250] bg-[#020b14] flex flex-col">
        <nav class="p-4 glass border-b border-cyan-500/20 flex justify-between items-center px-6 md:px-10">
            <h3 id="vault-title" class="font-black text-yellow-400 text-xs md:text-sm italic uppercase truncate">Secure Preview</h3>
            <button onclick="closeVault()" class="bg-brand-blue/40 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest text-cyan-400 border border-cyan-500/30">Close</button>
        </nav>
        <div class="flex-grow flex items-center justify-center p-2 md:p-4">
            <iframe id="vault-frame" class="w-full aspect-video md:h-full max-w-6xl rounded-xl shadow-2xl border border-cyan-500/20" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Management Modal -->
    <div id="mgr-modal" class="hidden fixed inset-0 z-[350] bg-[#020b14]/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="w-full max-w-md glass p-6 md:p-10 rounded-[2.5rem] border border-cyan-500/30">
            <h3 id="mgr-title" class="text-xl md:text-2xl font-black mb-4 tracking-tighter text-yellow-500 italic underline decoration-cyan-500">Edit Resource</h3>
            <div id="mgr-body" class="space-y-4 mb-8"></div>
            <div class="flex gap-3" id="mgr-footer"></div>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[100] bg-[#020b14]/95 flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] relative text-center">
            <button onclick="closeOtp()" class="absolute top-6 right-6 text-cyan-500">✕</button>
            <div class="text-4xl mb-2 logo-star">★</div>
            <h3 class="text-xl font-black mb-2 text-white">Verify Identity</h3>
            <p id="otp-note" class="text-cyan-400 text-[9px] mb-8 uppercase tracking-widest font-bold"></p>
            <input type="number" id="otp-input" class="input-field text-center text-3xl font-black mb-8" placeholder="000000">
            <button onclick="verifyOtp()" class="w-full py-4 btn-brand rounded-2xl font-black uppercase">Verify</button>
        </div>
    </div>

    <div id="app">
        <!-- Auth View -->
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-8 md:p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                <!-- Subtle background glow to match logo blue/orange -->
                <div class="absolute -top-20 -left-20 w-40 h-40 bg-blue-600/20 blur-[80px]"></div>
                <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-orange-600/20 blur-[80px]"></div>

                <div class="text-center mb-8">
                    <div class="inline-block text-5xl mb-2 drop-shadow-[0_0_8px_rgba(255,180,0,0.4)]">📖<span class="logo-star">★</span></div>
                    <h1 class="text-4xl font-black tracking-tighter italic">Open<span class="text-yellow-500">Class</span></h1>
                </div>

                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="STUDENT">Student</option>
                        <option value="TEACHER">Teacher</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Campus Email" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-brand rounded-2xl font-black uppercase">Sign In</button>
                    <button onclick="toggleMode()" class="w-full text-[10px] text-cyan-400 font-bold uppercase tracking-widest mt-4">Create Account</button>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-4 md:p-5 glass border-b border-cyan-500/20 sticky top-0 z-50 flex flex-col md:flex-row gap-4 justify-between px-6 md:px-10 items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="loadHome()">
                    <span class="text-2xl">📖</span>
                    <h2 class="text-xl md:text-2xl font-black tracking-tighter italic">Open<span class="text-yellow-500">Class</span></h2>
                </div>
                
                <div class="relative w-full md:w-auto">
                    <input type="text" id="g-search" onkeyup="handleSearch(event)" placeholder="Search Teacher or ID..." class="input-field py-2 text-sm w-full md:w-80 md:focus:w-96">
                    <div id="search-results" class="hidden absolute top-full left-0 right-0 mt-4 glass p-4 rounded-[1.5rem] border border-cyan-500/30 max-h-[60vh] overflow-y-auto"></div>
                </div>

                <button onclick="logout()" class="text-[10px] font-black text-cyan-500 hover:text-yellow-500 uppercase tracking-widest transition-colors">Logout</button>
            </nav>
            <main id="main-content" class="p-4 md:p-10 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbxII3g79Ri9EOX4zLr3rDgOlTprDwHsr5SEMysBqhh7owEKq9JcI4cVzvozIVdBJT6D8g/exec",
            EMAIL_SVC: "service_djr1n0f",
            EMAIL_TMP: "template_tiqnb53",
            EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false, genOtp, pending;

        function toast(msg, type="success") {
            const b = document.getElementById('toast-box');
            const d = document.createElement('div');
            d.className = `glass px-6 py-4 rounded-xl border-l-4 ${type==='success'?'border-yellow-500':'border-red-500'} text-[10px] font-black uppercase tracking-widest`;
            d.innerText = msg; b.appendChild(d);
            setTimeout(() => { d.style.opacity = '0'; setTimeout(() => d.remove(), 500); }, 3000);
        }

        function toggleLoader(s) { document.getElementById('global-loader').classList[s?'remove':'add']('hidden'); }
        function closeOtp() { document.getElementById('otp-modal').classList.add('hidden'); genOtp = null; }
        function closeVault() { document.getElementById('media-vault').classList.add('hidden'); document.getElementById('vault-frame').src=""; }
        function closeMgr() { document.getElementById('mgr-modal').classList.add('hidden'); }

        window.addEventListener('keydown', e => {
            if(e.key === 'Escape') { closeVault(); closeOtp(); closeMgr(); }
        });

        if(user) renderDashboard();

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Verify Email" : "Sign In";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return toast("Fill all fields", "error");
            
            if(isSignup) {
                genOtp = Math.floor(100000 + Math.random() * 900000);
                pending = { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value };
                document.getElementById('otp-note').innerText = `Sent to ${email}`;
                try {
                    await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: genOtp });
                    document.getElementById('otp-modal').classList.remove('hidden');
                } catch(e) { toast("Email Service Error", "error"); }
            } else {
                toggleLoader(true);
                const res = await api("login", { email, password: pass });
                if(res.email) { localStorage.setItem('oc_user', JSON.stringify(res)); user = res; renderDashboard(); }
                else toast(res, "error");
                toggleLoader(false);
            }
        }

        async function verifyOtp() {
            if(document.getElementById('otp-input').value == genOtp) {
                toggleLoader(true);
                await api("signup", pending);
                toast("Campus Access Granted!");
                location.reload();
            } else toast("Wrong OTP Code", "error");
        }

        function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            loadHome();
        }

        async function loadHome() {
            const main = document.getElementById('main-content');
            toggleLoader(true);
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-10">
                        <div class="glass p-6 md:p-8 rounded-[2rem] h-fit lg:sticky lg:top-28 border-cyan-500/20">
                            <h3 class="text-yellow-500 font-black text-[10px] uppercase mb-6 tracking-widest italic flex items-center gap-2">
                                <span class="text-lg">↗</span> Publish Resource
                            </h3>
                            <input id="up-title" placeholder="Topic Title" class="input-field mb-3">
                            <input id="up-url" placeholder="Resource URL" class="input-field mb-3">
                            <select id="up-type" class="input-field mb-6"><option value="VIDEO">Video Lesson</option><option value="FILE">Static File</option></select>
                            <button onclick="publish()" class="w-full py-4 btn-brand rounded-2xl font-black uppercase">Post Live</button>
                            <div class="mt-8 pt-6 border-t border-cyan-500/10"><p class="text-[9px] text-cyan-500 uppercase font-black text-center">ID: ${user.teacherId}</p></div>
                        </div>
                        <div id="feed" class="lg:col-span-2 space-y-4 md:space-y-6"></div>
                    </div>`;
                const data = await api("search", { email: user.email }, user.teacherId);
                renderFeed(data[0]?.posts || [], true);
            } else {
                main.innerHTML = `<div id="feed" class="max-w-2xl mx-auto space-y-4 md:space-y-6"></div>`;
                const data = await api("get_subscribed_feed", { email: user.email });
                renderFeed(data, false);
            }
            toggleLoader(false);
        }

        async function handleSearch(e) {
            const q = e.target.value;
            const resDiv = document.getElementById('search-results');
            if(q.length < 2) return resDiv.classList.add('hidden');
            resDiv.classList.remove('hidden');
            resDiv.innerHTML = `<p class="p-4 text-center text-[10px] font-black text-cyan-500 animate-pulse uppercase">Searching Directory...</p>`;
            const data = await api("search", { email: user.email }, q);
            resDiv.innerHTML = data.map(t => `
                <div class="p-4 hover:bg-cyan-500/10 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 cursor-pointer group" onclick="viewTeacherProfile('${t.id}')">
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <p class="font-bold text-sm text-white">${t.name}</p>
                            <span class="text-[8px] bg-cyan-500/20 text-cyan-400 px-2 py-0.5 rounded-full font-black">${t.id}</span>
                        </div>
                        <p class="text-[9px] text-cyan-600 uppercase font-bold tracking-widest">${t.postCount} Posts • ${t.subCount} Subs</p>
                    </div>
                    <button onclick="event.stopPropagation(); toggleSubscription(this, '${t.id}', ${t.isSubscribed})" class="w-full sm:w-auto px-4 py-2 ${t.isSubscribed?'bg-blue-900/30 text-cyan-600 border border-cyan-500/20':'btn-brand'} rounded-xl text-[9px] font-black uppercase">
                        ${t.isSubscribed?'Unsubscribe':'Subscribe'}
                    </button>
                </div>`).join('');
        }

        async function toggleSubscription(btn, tId, isSubbed) {
            btn.disabled = true;
            const action = isSubbed ? "unsubscribe" : "subscribe";
            await api(action, { studentEmail: user.email, teacherId: tId });
            toast(`${isSubbed?'Removed':'Added'} Teacher!`);
            handleSearch({ target: { value: document.getElementById('g-search').value } });
            if(user.role === 'STUDENT') loadHome();
        }

        async function viewTeacherProfile(tId) {
            toggleLoader(true);
            const data = await api("search", { email: user.email }, tId);
            const t = data[0];
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <button onclick="loadHome()" class="mb-6 text-cyan-500 text-[10px] font-black uppercase tracking-widest hover:text-yellow-500 transition-all">← Back to Feed</button>
                    <div class="glass p-6 md:p-10 rounded-[2.5rem] border-cyan-500/20 mb-6 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="text-center md:text-left">
                            <span class="text-[9px] text-yellow-500 font-black uppercase tracking-widest">Verified Instructor</span>
                            <h2 class="text-3xl md:text-4xl font-black italic tracking-tighter mt-1 text-white">${t.name}</h2>
                            <p class="text-cyan-400 font-bold text-sm italic uppercase tracking-widest">${t.institute}</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="flex gap-6">
                                <div class="text-center"><p class="text-[9px] text-cyan-600 font-bold uppercase">Posts</p><p class="text-2xl font-black text-yellow-500">${t.postCount}</p></div>
                                <div class="text-center"><p class="text-[9px] text-cyan-600 font-bold uppercase">Subs</p><p class="text-2xl font-black text-yellow-500">${t.subCount}</p></div>
                            </div>
                            <button onclick="toggleSubscription(this, '${t.id}', ${t.isSubscribed})" class="px-6 py-3 ${t.isSubscribed?'bg-blue-900/30 text-cyan-600 border border-cyan-500/20':'btn-brand'} rounded-2xl text-[10px] font-black uppercase transition-all shadow-xl">
                                ${t.isSubscribed?'Unsubscribe':'Subscribe'}
                            </button>
                        </div>
                    </div>
                    <div class="space-y-4">${t.posts.map(p => `
                        <div class="glass p-5 rounded-[1.5rem] flex justify-between items-center group hover:border-cyan-500/50 transition-all">
                            <div class="flex items-center gap-3 truncate">
                                <div class="flex-shrink-0 w-10 h-10 bg-blue-900/40 border border-cyan-500/20 rounded-2xl flex items-center justify-center">
                                    <span class="text-cyan-400">${p.type==='VIDEO'?'🎬':'📄'}</span>
                                </div>
                                <div class="truncate">
                                    <h4 class="font-bold text-sm text-zinc-100 truncate">${p.title}</h4>
                                    <p class="text-[8px] text-cyan-600 uppercase font-bold tracking-widest">by ${t.name}</p>
                                </div>
                            </div>
                            <button onclick="openResource('${p.id}','${p.url}','${p.type}','${p.title}')" class="bg-white text-blue-900 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-yellow-500 hover:text-white transition-all">Access</button>
                        </div>`).join('')}</div>
                </div>`;
            document.getElementById('search-results').classList.add('hidden');
            toggleLoader(false);
        }

        async function publish() {
            const title = document.getElementById('up-title').value.trim();
            const url = document.getElementById('up-url').value.trim();
            if(!title || !url) return toast("Fill all fields", "error");
            const p = { teacherId: user.teacherId, teacherName: user.name, title, url, type: document.getElementById('up-type').value };
            toggleLoader(true); await api("upload", p); toast("Resource Published!"); loadHome();
        }

        function renderFeed(data, isT) {
            const f = document.getElementById('feed');
            if(!data || !data.length) { f.innerHTML = `<p class="text-center py-20 text-cyan-700 uppercase text-[9px] font-black tracking-widest animate-pulse">No campus activity found</p>`; return; }
            f.innerHTML = data.map(i => `
                <div class="glass p-6 md:p-8 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center border border-transparent hover:border-cyan-500/40 transition-all group shadow-xl gap-6">
                    <div class="flex items-center gap-4 md:gap-6 w-full sm:w-auto">
                        <div class="flex-shrink-0 w-12 h-12 md:w-14 md:h-14 bg-blue-900/40 border border-cyan-500/30 rounded-3xl flex items-center justify-center transition-all group-hover:scale-110">
                            <span class="text-xl text-cyan-400">${i.type==='VIDEO'?'🎬':'📄'}</span>
                        </div>
                        <div class="truncate">
                            <p class="text-[9px] text-yellow-500 font-black uppercase tracking-widest">${i.type}</p>
                            <h4 class="font-black text-lg md:text-xl text-white tracking-tight italic truncate">${i.title}</h4>
                            <p class="text-[9px] text-cyan-600 font-bold uppercase tracking-widest truncate">${i.tName ? 'Instructor: ' + i.tName : 'Campus Resource'} • ${i.views||0} Views</p>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="openResource('${i.id}','${i.url}','${i.type}','${i.title}')" class="flex-grow sm:flex-grow-0 bg-white text-blue-900 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-yellow-500 hover:text-white transition-all shadow-lg">Open</button>
                        ${isT ? `
                            <button onclick="openEdit('${i.id}','${i.title}','${i.url}')" class="p-3 bg-blue-900/40 border border-cyan-500/20 rounded-xl hover:text-yellow-500 transition-all text-cyan-400">✎</button>
                            <button onclick="openDel('${i.id}')" class="p-3 bg-blue-900/40 border border-cyan-500/20 rounded-xl hover:text-red-500 transition-all text-cyan-400">🗑</button>
                        ` : ''}
                    </div>
                </div>`).join('');
        }

        function openEdit(id, t, u) {
            document.getElementById('mgr-title').innerText = "Update Resource";
            document.getElementById('mgr-body').innerHTML = `<input id="e-t" value="${t}" class="input-field"><input id="e-u" value="${u}" class="input-field">`;
            document.getElementById('mgr-footer').innerHTML = `<button onclick="closeMgr()" class="flex-1 py-4 bg-blue-900/40 border border-cyan-500/20 rounded-xl text-cyan-500 uppercase font-black text-[10px]">Cancel</button><button onclick="saveEdit('${id}')" class="flex-1 py-4 btn-brand rounded-xl uppercase font-black text-[10px]">Update</button>`;
            document.getElementById('mgr-modal').classList.remove('hidden');
        }

        async function saveEdit(id) {
            const title = document.getElementById('e-t').value.trim();
            const url = document.getElementById('e-u').value.trim();
            if(!title || !url) return toast("Empty fields", "error");
            closeMgr(); toggleLoader(true); await api("edit_content", { id, title, url }); toast("Sync Complete!"); loadHome();
        }

        function openDel(id) {
            document.getElementById('mgr-title').innerText = "Permanently Remove";
            document.getElementById('mgr-body').innerHTML = `<p class="text-cyan-600 text-xs uppercase font-bold tracking-widest leading-loose">Destroying this resource will remove it from all student feeds permanently.</p>`;
            document.getElementById('mgr-footer').innerHTML = `<button onclick="closeMgr()" class="flex-1 py-4 bg-blue-900/40 border border-cyan-500/20 rounded-xl text-cyan-500 uppercase font-black text-[10px]">Cancel</button><button onclick="confirmDel('${id}')" class="flex-1 py-4 bg-red-600/40 border border-red-500/30 rounded-xl uppercase font-black text-[10px]">Confirm</button>`;
            document.getElementById('mgr-modal').classList.remove('hidden');
        }

        async function confirmDel(id) {
            closeMgr(); toggleLoader(true); await api("delete_content", { id }); toast("Resource Destroyed!", "error"); loadHome();
        }

        function openResource(id, url, type, title) {
            document.getElementById('vault-title').innerText = title.toUpperCase();
            let src = url;
            if(type === 'VIDEO') {
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                src = `https://www.youtube.com/embed/${vid}?autoplay=1&modestbranding=1&rel=0`;
            } else if(url.includes('drive.google.com')) src = url.replace('/view', '/preview');
            document.getElementById('vault-frame').src = src;
            document.getElementById('media-vault').classList.remove('hidden');
        }

        async function api(a, p={}, q="") {
            try {
                const r = await fetch(`${CONFIG.URL}?action=${a}&query=${q}&payload=${encodeURIComponent(JSON.stringify(p))}`);
                return await r.json();
            } catch(e) { return "Network Error"; }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
