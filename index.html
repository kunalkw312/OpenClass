<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Professional LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-orange { background: #f97316; transition: 0.3s; font-weight: 700; }
        .btn-orange:hover { background: #ea580c; transform: translateY(-2px); }
        .input-field { background: #111; border: 1px solid #222; padding: 12px; border-radius: 12px; width: 100%; outline: none; color: white; }
    </style>
</head>
<body>

    <!-- Auth stays mostly same but with fixed Switch logic -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[2.5rem]">
            <h1 class="text-4xl font-black text-orange-500 text-center mb-8">OpenClass</h1>
            <div id="signup-fields" class="hidden space-y-4 mb-4">
                <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                <select id="reg-role" class="input-field">
                    <option value="STUDENT">Student</option>
                    <option value="TEACHER">Teacher</option>
                </select>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="input-field">
                <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-orange rounded-xl">Login</button>
                <button onclick="toggleMode()" class="w-full text-[10px] text-zinc-600 mt-4 uppercase font-bold">Switch Mode</button>
            </div>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[2.5rem] relative">
            <button onclick="closeOtp()" class="absolute top-6 right-6 text-zinc-500">✕</button>
            <h3 class="text-xl font-bold text-center mb-2">Verify OTP</h3>
            <p id="otp-note" class="text-zinc-500 text-xs text-center mb-6"></p>
            <input type="number" id="otp-input" class="input-field text-center text-3xl font-bold mb-6">
            <button onclick="verifyOtp()" class="w-full py-4 btn-orange rounded-xl">Finish</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden min-h-screen">
        <nav class="p-4 border-b border-zinc-900 glass flex justify-between items-center sticky top-0 z-50 px-8">
            <h2 class="text-xl font-black text-orange-500 tracking-tighter cursor-pointer" onclick="loadHome()">OPENCLASS</h2>
            <div class="flex gap-4">
                <input type="text" id="g-search" onkeyup="if(event.key==='Enter') searchContent()" placeholder="Search Teacher or Topic..." class="bg-zinc-900 px-4 py-1 rounded-lg text-xs outline-none border border-zinc-800">
                <button onclick="logout()" class="text-xs text-zinc-600">LOGOUT</button>
            </div>
        </nav>
        <main id="main-content" class="p-8 max-w-6xl mx-auto"></main>
    </div>

    <script>
        const CONFIG = {
            URL: "https://script.google.com/macros/s/AKfycbwcYobCD7N1oOJQvldU9zsQCBRp247Rl-ZZvflaVczqpcANtLPT58xtzUJdAGzmFxvrjg/exec",
            EMAIL_SVC: "service_djr1n0f",
            EMAIL_TMP: "template_tiqnb53",
            EMAIL_PUB: "P88qoYcr5CHYVNAPw"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false, genOtp, pending;

        if(user) renderDashboard();

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Send OTP" : "Login";
        }
        function closeOtp() { document.getElementById('otp-modal').classList.add('hidden'); }

        async function api(action, payload = {}, query = "") {
            const res = await fetch(`${CONFIG.URL}?action=${action}&query=${query}&payload=${encodeURIComponent(JSON.stringify(payload))}`);
            return await res.json();
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(isSignup) {
                genOtp = Math.floor(100000 + Math.random() * 900000);
                pending = { email, password: pass, name: document.getElementById('reg-name').value, role: document.getElementById('reg-role').value };
                document.getElementById('otp-note').innerText = `OTP sent to ${email}`;
                await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: genOtp });
                document.getElementById('otp-modal').classList.remove('hidden');
            } else {
                const res = await api("login", { email, password: pass });
                if(res.email) { localStorage.setItem('oc_user', JSON.stringify(res)); user = res; renderDashboard(); }
                else { alert(res); }
            }
        }

        async function verifyOtp() {
            if(document.getElementById('otp-input').value == genOtp) {
                const res = await api("signup", pending);
                alert(res === "Success" ? "Account Created!" : res);
                location.reload();
            }
        }

        function renderDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            loadHome();
        }

        async function loadHome() {
            const main = document.getElementById('main-content');
            if(user.role === 'TEACHER') {
                main.innerHTML = `
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="glass p-6 rounded-3xl h-fit">
                            <h3 class="text-orange-500 font-bold text-xs mb-4 uppercase">Upload Content</h3>
                            <input id="up-title" placeholder="Title" class="input-field mb-3">
                            <input id="up-url" placeholder="URL" class="input-field mb-3">
                            <select id="up-type" class="input-field mb-4">
                                <option value="VIDEO">Video</option>
                                <option value="FILE">Document</option>
                            </select>
                            <button onclick="uploadContent()" class="w-full py-3 btn-orange rounded-xl text-xs">PUBLISH</button>
                            <div class="mt-8 pt-6 border-t border-zinc-800">
                                <p class="text-zinc-500 text-[10px] uppercase">My Teacher ID</p>
                                <p class="text-xl font-bold">${user.teacherId}</p>
                            </div>
                        </div>
                        <div id="feed" class="md:col-span-2 space-y-4">Loading your uploads...</div>
                    </div>
                `;
                const data = await api("search", {}, user.teacherId);
                renderFeed(data, true);
            } else {
                main.innerHTML = `<div id="feed" class="space-y-4 max-w-2xl mx-auto">Loading Subscribed Feed...</div>`;
                const data = await api("get_subscribed_feed", { email: user.email });
                renderFeed(data, false);
            }
        }

        function renderFeed(data, isTeacher) {
            const feed = document.getElementById('feed');
            if(!data || data.length === 0) { 
                feed.innerHTML = isTeacher ? "You haven't posted anything." : "Subscribe to teachers to see updates."; 
                return; 
            }
            feed.innerHTML = data.map(item => `
                <div class="glass p-6 rounded-2xl flex justify-between items-center group">
                    <div>
                        <span class="text-[10px] text-orange-500 font-bold uppercase">${item.type}</span>
                        <h4 class="text-lg font-bold">${item.title}</h4>
                        <p class="text-xs text-zinc-500">${item.tName} • ${item.views} Views</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openLink('${item.id}','${item.url}','${item.type}')" class="bg-white text-black px-4 py-2 rounded-lg text-xs font-bold">VIEW</button>
                        ${isTeacher ? `
                            <button onclick="editContent('${item.id}','${item.title}','${item.url}')" class="bg-zinc-800 p-2 rounded-lg">✎</button>
                            <button onclick="deleteContent('${item.id}')" class="bg-red-900/20 text-red-500 p-2 rounded-lg">🗑</button>
                        ` : ''}
                        ${!isTeacher && !item.isSubbed ? `<button onclick="subscribe('${item.tId}')" class="bg-orange-500/20 text-orange-500 px-4 py-2 rounded-lg text-xs font-bold">SUBSCRIBE</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function searchContent() {
            const q = document.getElementById('g-search').value;
            const data = await api("search", {}, q);
            renderFeed(data, false);
        }

        async function uploadContent() {
            const payload = { teacherId: user.teacherId, teacherName: user.name, title: document.getElementById('up-title').value, url: document.getElementById('up-url').value, type: document.getElementById('up-type').value };
            await api("upload", payload);
            loadHome();
        }

        async function deleteContent(id) {
            if(confirm("Delete this?")) { await api("delete", { id }); loadHome(); }
        }

        async function editContent(id, oldTitle, oldUrl) {
            const title = prompt("New Title:", oldTitle);
            const url = prompt("New URL:", oldUrl);
            if(title && url) { await api("edit", { id, title, url }); loadHome(); }
        }

        async function subscribe(tId) {
            await api("subscribe", { studentEmail: user.email, teacherId: tId });
            alert("Subscribed to " + tId);
            loadHome();
        }

        async function openLink(id, url, type) {
            await api("track_view", { id });
            if(type === 'VIDEO') {
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                window.open(`https://www.youtube.com/watch?v=${vid}`, '_blank');
            } else { window.open(url, '_blank'); }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
