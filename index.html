<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass Pro | Secure Learning</title>
    <!-- Standard Tailwind Play CDN (fine for GitHub Pages pilots) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-orange { background: #f97316; transition: all 0.3s; }
        .btn-orange:hover { background: #ea580c; transform: scale(1.02); }
        .input-field { background: #111; border: 1px solid #222; padding: 12px; border-radius: 12px; width: 100%; outline: none; color: white; }
        .input-field:focus { border-color: #f97316; }
    </style>
</head>
<body>

    <div id="auth-container" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-8 rounded-[2rem]">
            <h1 class="text-4xl font-black text-orange-500 text-center mb-8">OpenClass</h1>
            <div id="auth-form" class="space-y-4">
                <div id="signup-fields" class="hidden space-y-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <input type="text" id="reg-inst" placeholder="Institute" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="STUDENT">Student</option>
                        <option value="TEACHER">Teacher</option>
                    </select>
                </div>
                <input type="email" id="auth-email" placeholder="Email" class="input-field">
                <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                <button onclick="handleAuth()" id="primary-btn" class="w-full py-4 btn-orange rounded-xl font-bold uppercase mt-4">Login</button>
                <p class="text-center text-sm text-zinc-500 mt-6">
                    <button onclick="toggleAuth()" class="text-orange-500 font-bold">Switch Login / Signup</button>
                </p>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen flex flex-col">
        <nav class="p-4 border-b border-zinc-800 glass flex justify-between items-center sticky top-0 z-50">
            <h2 class="text-xl font-black text-orange-500">OPENCLASS</h2>
            <button onclick="logout()" class="text-zinc-500 hover:text-red-500 font-bold">LOGOUT</button>
        </nav>
        <main id="content" class="p-6 max-w-4xl mx-auto w-full"></main>
    </div>

    <script>
        const CONFIG = {
            SHEET_URL: "https://script.google.com/macros/s/AKfycbygAYCprnChBI9MdVX43a9LwxRK2LlK1Esg8Eym42Y3Hm-BrZUOG-hN2fwRiHkiP3i_AQ/exec",
            EMAILJS_PUB: "P88qoYcr5CHYVNAPw",
            EMAILJS_SVC: "service_djr1n0f",
            EMAILJS_TMP: "template_tiqnb53"
        };

        emailjs.init(CONFIG.EMAIL_PUB);
        let user = JSON.parse(localStorage.getItem('oc_user'));
        let isSignup = false;

        if(user) renderUI();

        function toggleAuth() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('primary-btn').innerText = isSignup ? "Verify & Register" : "Login";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const btn = document.getElementById('primary-btn');

            if(!email || !pass) return alert("Please fill all fields");
            btn.disabled = true; btn.innerText = "Connecting...";

            try {
                if(isSignup) {
                    const otp = Math.floor(100000 + Math.random() * 900000);
                    await emailjs.send(CONFIG.EMAIL_SVC, CONFIG.EMAIL_TMP, { to_email: email, otp: otp });
                    if(prompt("Enter OTP sent to " + email) == otp) {
                        const payload = { 
                            action: "signup", 
                            payload: { 
                                email, password: pass, 
                                name: document.getElementById('reg-name').value, 
                                role: document.getElementById('reg-role').value,
                                institute: document.getElementById('reg-inst').value,
                                age: 0 
                            }
                        };
                        // Use text() then parse for Google Script compatibility
                        const res = await fetch(CONFIG.URL, { method: 'POST', body: JSON.stringify(payload) });
                        alert("Account ready! Please Login.");
                        location.reload();
                    }
                } else {
                    const res = await fetch(CONFIG.URL, { method: 'POST', body: JSON.stringify({ action: "login", payload: { email, password: pass }}) });
                    const data = await res.json();
                    if(data.email) {
                        localStorage.setItem('oc_user', JSON.stringify(data));
                        user = data;
                        renderUI();
                    } else { alert(data); }
                }
            } catch(e) {
                console.error(e);
                alert("Server Connection Error. Check if your Script URL is correct and deployed as 'Anyone'.");
            }
            btn.disabled = false; btn.innerText = isSignup ? "Register" : "Login";
        }

        function renderUI() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            const main = document.getElementById('content');
            
            if(user.role === 'TEACHER') {
                main.innerHTML = `<div class="p-8 glass rounded-3xl"><h2 class="text-4xl font-black">${user.teacherId}</h2><p class="text-zinc-500">Teacher Dashboard Ready</p></div>`;
            } else {
                main.innerHTML = `<div class="p-8 glass rounded-3xl"><h2 class="text-4xl font-black">Welcome, Student</h2><p class="text-zinc-500">Use the search bar to find teachers.</p></div>`;
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
